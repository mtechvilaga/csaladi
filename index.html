<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="HandheldFriendly" content="true">
  <meta name="MobileOptimized" content="width">
  <title>Családi Feladatkezelő</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Feladatkezelő">
  <meta name="application-name" content="Feladatkezelő">
  <meta name="theme-color" content="#001226">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <style>
        /* ══ GLASS TÉMA CSS VÁLTOZÓK ══ */
        :root {
            --bg-deep:    #001a33;
            --bg-card:    #1e2a3a;
            --bg-input:   #0f1f30;
            --bg-dark:    #162030;
            --border-col: #2d4057;
        }
        /* Modern glass téma – minden sötét konténert átír */
        body.modern-theme {
            background: #090f1a !important;
        }
        body.modern-theme .pane {
            background: transparent !important;
        }
        body.modern-theme .day-btn {
            background: #111c2a !important;
            border-color: #2a3a50 !important;
            color: #e2e8f0 !important;
        }
        body.modern-theme input[type="text"],
        body.modern-theme input[type="password"],
        body.modern-theme select,
        body.modern-theme textarea {
            background: #111c2a !important;
            border-color: #2a3a50 !important;
            color: #e2e8f0 !important;
        }
        body.modern-theme input[type="date"],
        body.modern-theme input[type="time"] {
            background: transparent !important;
            border: none !important;
            color: #e2e8f0 !important;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            background-color: transparent !important;
            background-image: none !important;
            filter: invert(1) opacity(0.7) !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        body.modern-theme input[type="date"]::-webkit-calendar-picker-indicator,
        body.modern-theme input[type="time"]::-webkit-calendar-picker-indicator {
            background-color: transparent !important;
            background-image: none !important;
            filter: invert(1) opacity(0.7) !important;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; touch-action: manipulation; background: #090f1a; background-attachment:fixed; }
        #root { height: 100%; position: relative; z-index: 1; }
        body::before { display: none; }
        .dual-wrap { display: flex; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; }
        .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .pane-header { padding: 6px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        @media (pointer: coarse) {
            .pane-header { padding: 6px 10px; margin-top: env(safe-area-inset-top, 0px); }
            .pane-header img { width: 28px !important; height: 28px !important; }
            .pane-header span[style] { font-size: 1.4rem !important; }
            .pane-header-name { font-size: 0.65rem !important; letter-spacing: 0.05em !important; }
            .pane-header-title { font-size: 0.78rem !important; letter-spacing: 0.04em !important; white-space: normal !important; overflow: visible !important; text-overflow: unset !important; }
            .pane-header button { font-size: 0.55rem !important; padding: 4px 7px !important; min-height: 38px !important; min-width: 38px !important; }
            .copyright-bar { display: none !important; }
            .mobile-hide { display: none !important; }
            .mobile-btn-left {
                position: fixed; bottom: max(10px, env(safe-area-inset-bottom)); left: 10px;
                display: flex; gap: 8px; z-index: 300;
            }
            .mobile-btn-right {
                position: fixed; bottom: max(10px, env(safe-area-inset-bottom)); right: 10px;
                z-index: 300;
            }
        }
        /* ── TELEFON SPECIFIKUS (max 480px) ── */
        @media (max-width: 480px) {
            .pane-header { padding: 6px 8px !important; }
            .pane-scroll { padding: 8px 8px calc(70px + env(safe-area-inset-bottom)) !important; }
            .sc { margin-bottom: 0.4rem !important; }
        }
        @media (pointer: fine) {
            .mobile-btn-left, .mobile-btn-right { display: none !important; }
        }
        .pane-scroll { flex: 1; overflow-y: auto; padding: 10px 12px calc(72px + env(safe-area-inset-bottom)); font-size: 1rem; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        .pane-scroll::-webkit-scrollbar { width: 3px; }
        .pane-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }
        /* ── Kék blur + kék border az almenük doboz elemeire ── */
        /* A React inline style={{ borderRadius: 20 }} HTML-ben "border-radius: 20px;"-szé renderelődik */
        /* Csak elég nagy borderRadius-nál (kártya-szerű), elkerüli a kerek avatar / pill / gomb elemeket */
        .pane-scroll div[style*="border-radius: 10px"],
        .pane-scroll div[style*="border-radius: 12px"],
        .pane-scroll div[style*="border-radius: 14px"],
        .pane-scroll div[style*="border-radius: 16px"],
        .pane-scroll div[style*="border-radius: 18px"],
        .pane-scroll div[style*="border-radius: 20px"],
        .pane-scroll div[style*="border-radius: 22px"],
        .pane-scroll div[style*="border-radius: 24px"],
        .pane-scroll div[style*="border-radius: 26px"],
        .pane-scroll div[style*="border-radius: 28px"],
        .pane-scroll div[style*="border-radius: 30px"],
        .pane-scroll div[style*="border-radius: 32px"],
        .pane-scroll div[style*="border-radius: 34px"],
        .pane-scroll div[style*="border-radius: 36px"],
        .pane-scroll div[style*="border-radius: 38px"],
        .pane-scroll div[style*="border-radius: 40px"],
        .pane-scroll div[style*="border-radius: 1rem"],
        .pane-scroll div[style*="border-radius: 1.2rem"],
        .pane-scroll div[style*="border-radius: 1.5rem"],
        .pane-scroll div[style*="border-radius: 2rem"],
        .pane-scroll .nj-task,
        .pane-scroll .nj-task.error,
        .pane-scroll .nj-task.green,
        .pane-scroll .nj-task.green.success,
        .pane-scroll .nj-task.blue,
        .pane-scroll .nj-task.blue.success,
        .pane-scroll .nj-task.yellow,
        .pane-scroll .nj-task.yellow.success {
          box-shadow: 0 0 18px rgba(14,165,233,0.32), 0 0 40px rgba(14,165,233,0.22) !important;
          border: 1px solid #0EA5E9 !important;
        }
        .sc { background: #1e2a3a; border-radius: 1rem; margin-bottom: .55rem; overflow: hidden; border: 1px solid #0EA5E9; box-shadow: 0 0 20px rgba(14,165,233,0.35), 0 0 45px rgba(14,165,233,0.35) !important; transition: background .3s, border .3s, box-shadow .3s; }
        body.modern-theme .sc { background: #1a2535 !important; border: 1px solid #0EA5E9 !important; box-shadow: 0 0 20px rgba(14,165,233,0.35), 0 0 45px rgba(14,165,233,0.35) !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
        .chat-msg-area::-webkit-scrollbar { display: none; }
        .chat-msg-area { scrollbar-width: none; -ms-overflow-style: none; }
        .task-img { height: 65px; background: #7C3AED; position: relative; background-size: cover; background-position: center; }
        .day-btn { border-radius: 6px; border: 2px solid #3a4a5c; font-size: 7.5px; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: #cbd5e1; background: #162030; min-width: 34px; min-height: 34px; width: 34px; height: 34px; touch-action: manipulation; }
        .day-btn.active { background: #7C3AED; color: white; border-color: #7C3AED; }
        .pin-overlay { position: fixed; inset: 0; background: rgba(0,5,26,.93); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; overflow-y: auto; padding: 20px; }
        .pick-card { border-radius: 1.2rem; cursor: pointer; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: transform .15s; padding: 20px 14px; width: 100%; max-width: 200px; touch-action: manipulation; }
        .pick-card:active { transform: scale(0.94); opacity: 0.85; }

        /* ── GOMBOK ── */
        button { touch-action: manipulation; cursor: pointer; user-select: none; -webkit-user-select: none; }
        button:active { opacity: 0.75; transform: scale(0.96); transition: transform 0.1s, opacity 0.1s; }
        .pick-card:hover { transform: scale(1.05); }

        /* ── TOUCH ROW ── */
        .touch-row { min-height: 52px; display: flex; align-items: center; }
        .tap-active:active { opacity: 0.7; transform: scale(0.97); transition: transform 0.1s, opacity 0.1s; }

        /* ── RESZPONZÍV KÁRTYARÁCS ── */
        .menu-grid { display: grid; gap: 14px; justify-content: center; width: 100%; padding: 0 8px; }

        /* ── INPUT MEZŐK ── */
        input, select, textarea { font-size: 16px !important; touch-action: manipulation; }
        input[type="text"], input[type="password"], input[type="date"], input[type="time"], select, textarea {
            background: #0f1f30 !important; color: #e2e8f0 !important; border-color: #2d4057 !important;
        }
        input[type="text"]::placeholder, textarea::placeholder { color: #64748b !important; }
        input[type="time"] { color-scheme: dark !important; color: #ffffff !important; font-size: 1rem !important; font-weight: 700 !important; }
        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(2) !important; cursor: pointer; width: 20px; height: 20px; opacity: 1 !important; background-color: transparent !important;
        }
        input[type="file"] { color: #94a3b8; }
        option { background: #162030 !important; color: #e2e8f0 !important; }

        /* ── ASZTALI (pointer:fine) ── */
        @media (pointer: fine) {
            .menu-grid { grid-template-columns: 1fr; max-width: 340px; margin: 0 auto; }
            .menu-card { width: 100%; height: 110px; }
            button { min-height: 36px; }
        }

        /* ── ÉRINTŐKÉPERNYŐ (pointer:coarse) ── */
        @media (pointer: coarse) {
            .pane-scroll::-webkit-scrollbar { display: none; }
            button { min-height: 44px; }
            .day-btn { min-width: 38px; min-height: 38px; width: 38px; height: 38px; font-size: 9px !important; }
            .menu-grid { grid-template-columns: 1fr; max-width: 340px; margin: 0 auto; }
            .menu-card { width: 100% !important; height: 110px !important; }
            .sc { border-radius: 0.8rem; }
            .pick-card { max-width: 160px; padding: 16px 10px; }
        }

        /* ── KIS KÉPERNYŐ (max 400px) ── */
        @media (max-width: 400px) {
            .menu-grid { grid-template-columns: 1fr; max-width: 320px; margin: 0 auto; gap: 10px; padding: 0 6px; }
            .menu-card { height: 100px !important; }
            .pane-scroll { padding: 8px 10px 80px; }
        }

        /* ── SCROLLBAR ELREJTÉS MOBILON ── */
        @media (pointer: coarse) {
            * { scrollbar-width: none; }
            *::-webkit-scrollbar { display: none; }
            .dict-wordlist { scrollbar-width: thin !important; scrollbar-color: #d5d5d5 rgba(255,255,255,.10) !important; }
            .dict-wordlist::-webkit-scrollbar { display: block !important; width: 10px !important; }
            .dict-wordlist::-webkit-scrollbar-track { background: rgba(255,255,255,.10) !important; border-radius: 999px !important; }
            .dict-wordlist::-webkit-scrollbar-thumb { background: #d5d5d5 !important; border-radius: 999px !important; }
        }

        /* ── CHAT ÜZENETLISTA SCROLLBAR ELREJTÉS ── */
        .chat-messages::-webkit-scrollbar { display: none; }

        /* ── SZÓTÁR SZÓLISTA SCROLLBAR ── */
        .dict-wordlist::-webkit-scrollbar { width: 10px; }
        .dict-wordlist::-webkit-scrollbar-track { background: rgba(255,255,255,.10); border-radius: 999px; }
        .dict-wordlist::-webkit-scrollbar-thumb { background: #d5d5d5; border-radius: 999px; }
        .dict-wordlist { scrollbar-width: thin; scrollbar-color: #d5d5d5 rgba(255,255,255,.10); }

        /* ── MOBIL MENÜKÁRTYA OPTIMALIZÁLÁS ── */
        @media (max-width: 480px) {
            .drag-card { padding: 12px 14px !important; border-radius: 14px !important; }
            .drag-card-icon { width: 40px !important; height: 40px !important; border-radius: 10px !important; font-size: 20px !important; }
            .drag-card-label { font-size: 0.9rem !important; }
            .drag-card-gap { gap: 12px !important; }
        }

        /* ══════════════════════════════════════════════════════
           MOBIL OPTIMALIZÁCIÓ – KIBŐVÍTETT SZABÁLYOK
           ══════════════════════════════════════════════════════ */

        /* ── Biztonságos terület kezelés minden irányon ── */
        @supports (padding: max(0px)) {
            .pane-header {
                padding-top: max(6px, env(safe-area-inset-top)) !important;
                padding-left: max(8px, env(safe-area-inset-left)) !important;
                padding-right: max(8px, env(safe-area-inset-right)) !important;
            }
            .mobile-btn-left {
                left: max(10px, env(safe-area-inset-left)) !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
            }
            .mobile-btn-right {
                right: max(10px, env(safe-area-inset-right)) !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
            }
            .pane-scroll {
                padding-bottom: max(80px, calc(60px + env(safe-area-inset-bottom))) !important;
            }
        }

        /* ── Érintési célterületek növelése – minimum 44×44pt ── */
        @media (pointer: coarse) {
            /* Minden gomb és interaktív elem legalább 44px magas/széles legyen */
            button,
            [role="button"],
            .tap-active,
            .touch-row {
                min-height: 44px !important;
                min-width: 44px !important;
            }
            /* Nap-gombok mobilon nagyobbak */
            .day-btn {
                min-width: 40px !important;
                min-height: 40px !important;
                width: 40px !important;
                height: 40px !important;
                font-size: 9px !important;
                border-radius: 8px !important;
            }
            /* Kártyák közötti rés nagyobb mobilon a könnyebb koppintáshoz */
            .sc { margin-bottom: 0.6rem !important; }
            /* Beviteli mezők – ne zoomoljon az iOS */
            input, select, textarea { font-size: 16px !important; }
            /* Pane-scroll padding a lebegő gombokhoz */
            .pane-scroll {
                padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)) !important;
            }
            /* Header jobb oldali gombok mérete mobilon */
            .pane-header button {
                min-height: 44px !important;
                min-width: 44px !important;
                padding: 8px 12px !important;
                font-size: 0.7rem !important;
            }
        }

        /* ── Kis képernyő (max 390px – pl. iPhone SE, régi Android) ── */
        @media (max-width: 390px) {
            .pane-header { padding: 4px 6px !important; }
            .pane-header-name { font-size: 0.6rem !important; max-width: 80px !important; }
            .pane-header-title { font-size: 0.6rem !important; }
            .menu-grid { gap: 8px !important; padding: 0 4px !important; }
            .menu-card { height: 90px !important; }
            .sc { border-radius: 0.7rem !important; margin-bottom: 0.35rem !important; }
            .day-btn { width: 36px !important; height: 36px !important; min-width: 36px !important; min-height: 36px !important; font-size: 8px !important; }
            .pick-card { max-width: 140px !important; padding: 12px 8px !important; }
        }

        /* ── Közepes mobilképernyő (391–480px) ── */
        @media (min-width: 391px) and (max-width: 480px) {
            .menu-grid { grid-template-columns: 1fr !important; max-width: 360px !important; margin: 0 auto !important; gap: 10px !important; }
            .menu-card { height: 100px !important; }
            .pane-scroll { padding: 8px 10px calc(80px + env(safe-area-inset-bottom, 0px)) !important; }
        }

        /* ── Nagy mobilképernyő (481–767px – nagy Android, iPhone Pro Max) ── */
        @media (min-width: 481px) and (max-width: 767px) {
            .menu-grid { grid-template-columns: 1fr 1fr !important; max-width: 600px !important; margin: 0 auto !important; gap: 12px !important; }
            .menu-card { height: 110px !important; }
        }

        /* ── Tájképi mód mobilon (landscape, max 480px magasság) ── */
        @media (max-height: 480px) and (orientation: landscape) {
            .pane-header { padding: 2px 8px !important; min-height: 40px !important; }
            .pane-header img { width: 24px !important; height: 24px !important; }
            .copyright-bar { display: none !important; }
            .pane-scroll { padding-top: 6px !important; padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)) !important; }
            .sc { margin-bottom: 0.3rem !important; }
            .mobile-btn-left, .mobile-btn-right { bottom: max(8px, env(safe-area-inset-bottom)) !important; }
            .pick-card { padding: 10px 8px !important; max-width: 130px !important; }
            .menu-card { height: 80px !important; }
        }

        /* ── Szöveg méretezés mobilon ── */
        @media (max-width: 480px) {
            /* Általános szövegsűrítés kis képernyőn */
            .pane-scroll { font-size: 0.92rem !important; }
            /* Nagyobb gomb-szöveg az olvashatósághoz */
            .mobile-btn-left button, .mobile-btn-right button {
                font-size: 0.72rem !important;
                padding: 11px 16px !important;
                border-radius: 12px !important;
                box-shadow: 0 4px 20px rgba(0,0,0,.6) !important;
            }
        }

        /* ── Overflow és scroll javítások mobilon ── */
        @media (pointer: coarse) {
            /* Vízszintes görgetés a nap-gombokhoz */
            .day-btns-wrap {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch !important;
                padding-bottom: 4px !important;
                scrollbar-width: none !important;
            }
            .day-btns-wrap::-webkit-scrollbar { display: none !important; }
            /* Akadálymentesség: aktív terület jelzése */
            .pick-card:active, button:active {
                opacity: 0.75 !important;
                transform: scale(0.95) !important;
            }
            /* Chat beviteli mező mobilon */
            .chat-input-wrap {
                padding-bottom: max(12px, env(safe-area-inset-bottom)) !important;
            }
        }

        /* ── Pin overlay mobilon ── */
        @media (max-width: 480px) {
            .pin-overlay {
                padding: 12px 10px !important;
                align-items: center !important;
            }
            .pick-card {
                max-width: 145px !important;
                padding: 14px 10px !important;
            }
        }

        /* ── Lebegő gombok (mobile-btn) – jobb elhelyezés ── */
        @media (pointer: coarse) {
            .mobile-btn-left {
                position: fixed !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
                left: max(10px, env(safe-area-inset-left)) !important;
                display: flex !important;
                gap: 8px !important;
                z-index: 300 !important;
            }
            .mobile-btn-right {
                position: fixed !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
                right: max(10px, env(safe-area-inset-right)) !important;
                z-index: 300 !important;
            }
            /* Gombok árnyéka jobban látszik sötét háttéren */
            .mobile-btn-left button,
            .mobile-btn-right button {
                box-shadow: 0 4px 20px rgba(0,0,0,.65), 0 1px 4px rgba(0,0,0,.4) !important;
                backdrop-filter: blur(8px) !important;
                -webkit-backdrop-filter: blur(8px) !important;
            }
        }

        /* ── Értesítési modal mobilon – teljesebb lefedés ── */
        @media (max-width: 480px) {
            /* A taskNotif és globalAlert modalok jobb megjelenítése mobilon */
            .mobile-modal-inner {
                max-height: 90vh !important;
                overflow-y: auto !important;
                border-radius: 1.2rem !important;
            }
        }

        /* ── Képernyő-olvasó és akadálymentesség ── */
        @media (prefers-reduced-motion: reduce) {
            button:active, .pick-card:active, .tap-active:active {
                transform: none !important;
                transition: none !important;
            }
        }

        /* ── Panel méret szabályozás ── */
        /* Asztali: az App.jsx-ben minden panelnél transform:"scale(1)" → változtasd tetszés szerint */
        /* Mobilon külön méret az alábbi osztályoknál: */
        @media (max-width: 480px) {
            /* NAPI JELENTÉS panel */
            .jelentes-panel { transform: scale(0.85) !important; transform-origin: top center !important; }
            /* RUTINOK panel */
            .rutinok-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* FELADATOK panel */
            .feladatok-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* ARANY panel */
            .arany-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* ADMIN FELADAT panel */
            .feladat-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* ADMIN RUTIN panel */
            .rutin-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* ARCHIV panel */
            .archiv-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* CSALÁD panel */
            .csalad-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* JÁTÉKOK panel */
            .jatekok-panel { transform: scale(1) !important; transform-origin: top center !important; }
        }
            /* NAPTÁR panel */
            .naptar-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* CHAT panel */
            .chat-panel { transform: scale(1) !important; transform-origin: top center !important; }

});

o.frequency.setValueAtTime(freq, start);
g.gain.setValueAtTime(0, start);

);

);

function JatekokPane({ user, profiles, onGameChange, robloxSettings, saveRobloxSettings, backroomsSettings, saveBackroomsSettings }) {

if (activeGame === "kviz") return <QuizGame user={user} onBack={goBack} />;

const todayStr = new Date().toISOString().slice(0,10);


const rs = robloxSettings || { locked: false, dailyLimit: 30, usedToday: 0, lastUsedDate: "" };
const usedTodayRoblox = rs.lastUsedDate === todayStr ? (rs.usedToday || 0) : 0;
const limitMinsRoblox = rs.dailyLimit || 30;
const remainMinsRoblox = Math.max(0, limitMinsRoblox - usedTodayRoblox);
const isLockedRoblox = rs.locked;
const isExhaustedRoblox = remainMinsRoblox <= 0;
const robloxBlocked = isLockedRoblox || isExhaustedRoblox;


const bs = backroomsSettings || { locked: false, dailyLimit: 30, usedToday: 0, lastUsedDate: "" };
const usedTodayBackrooms = bs.lastUsedDate === todayStr ? (bs.usedToday || 0) : 0;
const limitMinsBackrooms = bs.dailyLimit || 30;
const remainMinsBackrooms = Math.max(0, limitMinsBackrooms - usedTodayBackrooms);
const isLockedBackrooms = bs.locked;
const isExhaustedBackrooms = remainMinsBackrooms <= 0;
const backroomsBlocked = isLockedBackrooms || isExhaustedBackrooms;

const handleRobloxOpen = () => {
if(robloxBlocked) return;
window.open("https://www.roblox.com", "_blank");
if(saveRobloxSettings) {
saveRobloxSettings({ usedToday: usedTodayRoblox + 1, lastUsedDate: todayStr });
}
};

const handleBackroomsOpen = () => {
if(backroomsBlocked) return;
window.open("https://backroomsgame.io/", "_blank");
if(saveBackroomsSettings) {
saveBackroomsSettings({ usedToday: usedTodayBackrooms + 1, lastUsedDate: todayStr });
}
};

const tickRef = useRef(null);

const TIME_PER_Q = 20;

function getCtx() {
if(!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
return audioCtxRef.current;
}

function playTone(freq, type, duration, gainVal, startTime, ctx) {
const o = ctx.createOscillator();
const g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.type = type; o.frequency.setValueAtTime(freq, startTime);
g.gain.setValueAtTime(gainVal, startTime);
g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
o.start(startTime); o.stop(startTime + duration);
}

function soundCorrect() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(523, "sine", 0.12, 0.4, t,       ctx);
playTone(659, "sine", 0.12, 0.4, t+0.13,  ctx);
playTone(784, "sine", 0.22, 0.4, t+0.26,  ctx);
}

function soundWrong() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(300, "sawtooth", 0.15, 0.3, t,      ctx);
playTone(220, "sawtooth", 0.25, 0.3, t+0.16, ctx);
}

function soundTick() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(880, "square", 0.04, 0.15, t, ctx);
}

function soundUrgent() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(440, "square", 0.08, 0.35, t,      ctx);
playTone(440, "square", 0.08, 0.35, t+0.12, ctx);
playTone(440, "square", 0.08, 0.35, t+0.24, ctx);
}

function soundFanfare() {
const ctx = getCtx(); const t = ctx.currentTime;
const notes = [523,659,784,1047,784,1047];
const times = [0, 0.15, 0.30, 0.45, 0.65, 0.80];
notes.forEach((f,i) => playTone(f, "sine", 0.25, 0.5, t+times[i], ctx));
}

function soundTimeout() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(200, "sawtooth", 0.4, 0.4, t, ctx);
}

useEffect(() => {
if(phase === "playing" && selected === null) {
setTimer(TIME_PER_Q);
let lastTick = TIME_PER_Q;
timerRef.current = setInterval(() => {
setTimer(t => {
if(t <= 1) {
clearInterval(timerRef.current);
soundTimeout();
handleAnswer(null);
return 0;
}
if(t <= 5 && t !== lastTick) { soundUrgent(); }
else if(t > 5) { soundTick(); }
lastTick = t - 1;
return t - 1;
});
}, 1000);
return () => clearInterval(timerRef.current);
}
}, [current, phase]);

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

setQuestions(qs); setCurrent(0); setScore(0); setAnswers([]); setSelected(null);
setPhase("playing");
}

function handleAnswer(ans) {
clearInterval(timerRef.current);
const q = questions[current];
const correct = ans === q.a;
setSelected(ans);
setAnswers(prev => [...prev, { q: q.q, correct, chosen: ans, right: q.a }]);
if(correct) { setScore(s => s + 1); soundCorrect(); }
else if(ans !== null) { soundWrong(); }
setTimeout(() => {
if(current + 1 >= questions.length) {
soundFanfare();
setPhase("result");
} else { setCurrent(c => c + 1); setSelected(null); }
}, 1200);
}

function AmobaGame({ user, profiles, onBack }) {
const [phase, setPhase]       = useState("menu"); 
const [size, setSize]         = useState(null);
const [mode, setMode]         = useState(null);   
const [board, setBoard]       = useState([]);
const [current, setCurrent]   = useState("X");
const [winner, setWinner]     = useState(null);
const [winLine, setWinLine]   = useState([]);
const [scores, setScores]     = useState({X:0, O:0});


const [onlinePlayers, setOnlinePlayers] = useState([]);
const [mySymbol, setMySymbol]   = useState(null);   
const [opponentId, setOpponentId] = useState(null);
const [opponentName, setOpponentName] = useState("");
const [gameId, setGameId]       = useState(null);
const [invite, setInvite]       = useState(null);   
const channelRef               = useRef(null);
const presenceRef              = useRef(null);
const myId = user?.id ? String(user.id) : ("guest_" + Math.random().toString(36).slice(2,8));

const WIN = (s) => s === 3 ? 3 : 5;
const initBoard = (s) => Array(s).fill(null).map(()=>Array(s).fill(null));


useEffect(() => {
if(mode !== "online") return;
const ch = _supabase.channel("amoba_presence", { config:{ presence:{ key: myId }}});
presenceRef.current = ch;
ch.on("presence", { event:"sync" }, () => {
const state = ch.presenceState();
const players = Object.values(state).flat().map(p => p).filter(p => p.userId !== myId);
setOnlinePlayers(players);
});
ch.on("broadcast", { event:"invite" }, ({ payload }) => {
if(payload.toId === myId && !invite) {
setInvite(payload);
}
});
ch.on("broadcast", { event:"invite_accept" }, ({ payload }) => {
if(payload.toId === myId) {

const gid = payload.gameId;
setGameId(gid);
setOpponentId(payload.fromId);
setOpponentName(payload.fromName);
setMySymbol("X");
setSize(payload.size);
setBoard(initBoard(payload.size));
setCurrent("X"); setWinner(null); setWinLine([]);
setPhase("online-playing");
subscribeGame(gid);
}
});
ch.on("broadcast", { event:"invite_decline" }, ({ payload }) => {
if(payload.toId === myId) {
if(phase === "online-waiting") {
setPhase("online-lobby");
}
}
});
ch.subscribe(async (status) => {
if(status === "SUBSCRIBED") {
await ch.track({ userId: myId, name: user?.name || "Vendég", avatar: user?.avatar || "👤" });
}
});
return () => { ch.unsubscribe(); presenceRef.current = null; };
}, [mode]);


const subscribeGame = (gid) => {
const ch = _supabase.channel("amoba_game_" + gid);
channelRef.current = ch;
ch.on("broadcast", { event:"move" }, ({ payload }) => {
if(payload.playerId === myId) return; 
setBoard(prev => {
const nb = prev.map(row=>[...row]);
nb[payload.r][payload.c] = payload.sym;
const result = checkWinnerStatic(nb, payload.size, payload.winCount);
if(result) {
setWinner(result.winner);
setWinLine(result.line.map(([rr,cc])=>rr*payload.size+cc));
if(result.winner !== "draw") setScores(prev2=>({...prev2,[result.winner]:prev2[result.winner]+1}));
} else {
setCurrent(payload.sym === "X" ? "O" : "X");
}
return nb;
});
});
ch.on("broadcast", { event:"rematch" }, ({ payload }) => {
if(payload.playerId !== myId) {
setBoard(initBoard(payload.size));
setCurrent("X"); setWinner(null); setWinLine([]);
}
});
ch.on("broadcast", { event:"leave" }, () => {
setWinner("leave");
});
ch.subscribe();
};

const checkWinnerStatic = (b, s, W) => {
const lines = [];
for(let r=0;r<s;r++) for(let c=0;c<=s-W;c++) { const l=[]; for(let k=0;k<W;k++) l.push([r,c+k]); lines.push(l); }
for(let c=0;c<s;c++) for(let r=0;r<=s-W;r++) { const l=[]; for(let k=0;k<W;k++) l.push([r+k,c]); lines.push(l); }
for(let r=0;r<=s-W;r++) for(let c=0;c<=s-W;c++) { const l=[]; for(let k=0;k<W;k++) l.push([r+k,c+k]); lines.push(l); }
for(let r=0;r<=s-W;r++) for(let c=W-1;c<s;c++) { const l=[]; for(let k=0;k<W;k++) l.push([r+k,c-k]); lines.push(l); }
for(const line of lines) { const vals=line.map(([r,c])=>b[r][c]); if(vals[0]&&vals.every(v=>v===vals[0])) return {winner:vals[0],line}; }
if(b.every(row=>row.every(c=>c!==null))) return {winner:"draw",line:[]};
return null;
};

const checkWinner = (b, s) => checkWinnerStatic(b, s, WIN(s));


const aiMove = (b, s) => {
const W = WIN(s);
const empty = [];
for(let r=0;r<s;r++) for(let c=0;c<s;c++) if(!b[r][c]) empty.push([r,c]);
const score = (sym) => {
let best = -1, bestCell = null;
for(const [r,c] of empty) {
const nb = b.map(row=>[...row]);
nb[r][c] = sym;
let cnt = 0;
const dirs = [[0,1],[1,0],[1,1],[1,-1]];
for(const [dr,dc] of dirs) {
let n=1;
for(let k=1;k<W;k++) { const nr=r+dr*k,nc=c+dc*k; if(nr>=0&&nr<s&&nc>=0&&nc<s&&nb[nr][nc]===sym) n++; else break; }
for(let k=1;k<W;k++) { const nr=r-dr*k,nc=c-dc*k; if(nr>=0&&nr<s&&nc>=0&&nc<s&&nb[nr][nc]===sym) n++; else break; }
if(n>cnt) cnt=n;
}
if(cnt>best) { best=cnt; bestCell=[r,c]; }
}
return { best, bestCell };
};
const win = score("O");
if(win.best>=W-1) return win.bestCell;
const blk = score("X");
if(blk.best>=W-1) return blk.bestCell;
if(win.best>1) return win.bestCell;
const mid = Math.floor(s/2);
const near = empty.filter(([r,c])=>Math.abs(r-mid)<=2&&Math.abs(c-mid)<=2);
const pool = near.length>0 ? near : empty;
return pool[Math.floor(Math.random()*pool.length)];
};

const startGame = (s, m) => {
setSize(s); setMode(m);
if(m === "ai") {
setBoard(initBoard(s));
setCurrent("X"); setWinner(null); setWinLine([]);
setPhase("ai-playing");
} else {
setPhase("online-lobby");
}
};

const handleClick = (r, c) => {
if(winner || board[r][c]) return;
if(mode === "online") {
if(current !== mySymbol) return; 
const nb = board.map(row=>[...row]);
nb[r][c] = mySymbol;
const result = checkWinner(nb, size);
setBoard(nb);
channelRef.current?.send({ type:"broadcast", event:"move",
payload:{ r, c, sym: mySymbol, playerId: myId, size, winCount: WIN(size) }});
if(result) {
setWinner(result.winner);
setWinLine(result.line.map(([rr,cc])=>rr*size+cc));
if(result.winner !== "draw") setScores(prev=>({...prev,[result.winner]:prev[result.winner]+1}));
} else {
setCurrent(mySymbol === "X" ? "O" : "X");
}
return;
}

const nb = board.map(row=>[...row]);
nb[r][c] = current;
const result = checkWinner(nb, size);
setBoard(nb);
if(result) {
setWinner(result.winner);
setWinLine(result.line.map(([rr,cc])=>rr*size+cc));
if(result.winner !== "draw") setScores(prev=>({...prev,[result.winner]:prev[result.winner]+1}));
return;
}
const next = current==="X"?"O":"X";
setCurrent(next);
if(next==="O") {
setTimeout(()=>{
const [ar,ac] = aiMove(nb, size);
const nb2 = nb.map(row=>[...row]);
nb2[ar][ac] = "O";
const res2 = checkWinner(nb2, size);
setBoard(nb2);
if(res2) {
setWinner(res2.winner);
setWinLine(res2.line.map(([rr,cc])=>rr*size+cc));
if(res2.winner!=="draw") setScores(prev=>({...prev,[res2.winner]:prev[res2.winner]+1}));
} else { setCurrent("X"); }
}, 350);
}
};

const reset = () => {
const nb = initBoard(size);
setBoard(nb); setCurrent("X"); setWinner(null); setWinLine([]);
if(mode === "online") {
channelRef.current?.send({ type:"broadcast", event:"rematch", payload:{ playerId: myId, size }});
}
};

const backToMenu = () => {
if(mode === "online") {
channelRef.current?.send({ type:"broadcast", event:"leave", payload:{} });
channelRef.current?.unsubscribe();
channelRef.current = null;
presenceRef.current?.unsubscribe();
presenceRef.current = null;
}
setPhase("menu"); setMode(null); setSize(null);
setWinner(null); setWinLine([]); setScores({X:0,O:0});
setOnlinePlayers([]); setOpponentId(null); setOpponentName(""); setGameId(null); setInvite(null); setMySymbol(null);
};


const sendInvite = (targetPlayer) => {
const gid = myId + "_" + targetPlayer.userId + "_" + Date.now();
setGameId(gid);
setOpponentId(targetPlayer.userId);

function CardMenuLogin({ cards, onSelect, greeting, subtitle }) {
const storageKey = "card_order_" + greeting.slice(0,10).replace(/\s/g,"_");
const [orderedCards, setOrderedCards] = useState(() => {
try {
const saved = localStorage.getItem(storageKey);
if(saved) {
const order = JSON.parse(saved);
const sorted = [...cards].sort((a,b) => {
const ai = order.indexOf(a.id);
const bi = order.indexOf(b.id);
if(ai === -1 && bi === -1) return 0;
if(ai === -1) return 1;
if(bi === -1) return -1;
return ai - bi;
});
return sorted;
}
} catch(e) {}
return cards;
});
const [editMode, setEditMode] = useState(false);
const [dragIdx, setDragIdx] = useState(null);
const [dragOverIdx, setDragOverIdx] = useState(null);

useEffect(() => {
const newOrder = [...cards].sort((a,b) => {
const order = orderedCards.map(c=>c.id);
const ai = order.indexOf(a.id);
const bi = order.indexOf(b.id);
if(ai === -1 && bi === -1) return 0;
if(ai === -1) return 1;
if(bi === -1) return -1;
return ai - bi;
});
const newCards = newOrder.map(c => cards.find(x=>x.id===c.id)||c);
setOrderedCards(newCards);
}, [cards.map(c=>c.badge).join(",")]);

const saveOrder = (newCards) => {
try { localStorage.setItem(storageKey, JSON.stringify(newCards.map(c=>c.id))); } catch(e) {}
};

const handleDragStart = (e, idx) => { setDragIdx(idx); e.dataTransfer.effectAllowed = "move"; };
const handleDragOver = (e, idx) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOverIdx(idx); };
const handleDrop = (e, idx) => {
e.preventDefault();
if(dragIdx === null || dragIdx === idx) { setDragIdx(null); setDragOverIdx(null); return; }
const newCards = [...orderedCards];
const [moved] = newCards.splice(dragIdx, 1);
newCards.splice(idx, 0, moved);
setOrderedCards(newCards); saveOrder(newCards);
setDragIdx(null); setDragOverIdx(null);
};
const handleDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };

// 4-4-3 layout
const n = orderedCards.length;
const rows = [];
let i = 0;
while(i < n) {
const remaining = n - i;
let rowSize;
if(remaining <= 3) rowSize = remaining;
else if(remaining === 5) rowSize = 3;
else rowSize = 4;
rows.push(orderedCards.slice(i, i + rowSize));
i += rowSize;
}

return (
<div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:"100%", maxWidth:560, margin:"0 auto", padding:"0 8px" }}>

  </div>
  <button onClick={()=>setEditMode(e=>!e)}
    style={{ background: editMode ? "rgba(124,58,237,.5)" : "rgba(255,255,255,.08)", border: editMode ? "1.5px solid #7C3AED" : "1.5px solid rgba(255,255,255,.15)", borderRadius:10, padding:"5px 14px", color:"white", fontWeight:900, fontSize:"0.65rem", cursor:"pointer", marginBottom:10, alignSelf:"flex-end", display:"flex", alignItems:"center", gap:6, minHeight:36 }}>
    {editMode ? "✅ Kész" : "✏️ Sorrend"}
  </button>
  <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:window.innerWidth < 400 ? 6 : 10 }}>
  {rows.map((row, rowIdx) => (
    <div key={rowIdx} style={{ display:"flex", gap:window.innerWidth < 400 ? 6 : 10, justifyContent:"center" }}>
    {row.map((card, colIdx) => {
      const globalIdx = rows.slice(0,rowIdx).reduce((s,r)=>s+r.length,0) + colIdx;
      const isDragging = dragIdx === globalIdx;
      const isDragOver = dragOverIdx === globalIdx;
      const iconSrc = CARD_ICONS[card.id];
      const hasBadge = card.badge !== "" && card.badge !== undefined;
      // Kártya szélessége: 4 oszlop, de mobilon a teljes szélességből számítva
      const vw = window.innerWidth;
      const containerW = Math.min(vw - 16, 560);
      const cols = 4;
      const gapTotal = (cols - 1) * (vw < 400 ? 6 : 10);
      const cardW = Math.floor((containerW - gapTotal) / cols);
      return (
      <div key={card.id}
        draggable={editMode}
        onDragStart={editMode ? (e)=>handleDragStart(e,globalIdx) : undefined}
        onDragOver={editMode ? (e)=>handleDragOver(e,globalIdx) : undefined}
        onDrop={editMode ? (e)=>handleDrop(e,globalIdx) : undefined}
        onDragEnd={editMode ? handleDragEnd : undefined}
        onClick={() => { if(!editMode) onSelect(card.id); }}
        style={{
          flex: `0 0 ${cardW}px`,
          width: `${cardW}px`,
          minWidth: 0,
          aspectRatio: "1 / 1.18",
          background: isDragOver ? "rgba(124,58,237,0.25)" : "rgba(255,255,255,0.04)",
          backdropFilter: "blur(14px)",
          border: isDragOver ? "1.5px solid #7C3AED" : "1.5px solid rgba(255,255,255,0.12)",
          boxShadow: isDragOver ? "0 0 18px rgba(124,58,237,.5)" : "0 4px 18px rgba(0,0,0,0.35)",
          borderRadius: vw < 400 ? 14 : 20,
          cursor: editMode ? "grab" : "pointer",

          gap: vw < 400 ? 4 : 6,
          transition: "transform .15s, box-shadow .15s, opacity .15s, background .15s",
          opacity: isDragging ? 0.4 : 1,
          transform: isDragging ? "scale(0.95)" : "scale(1)",
          userSelect: "none",
          position: "relative",
          overflow: "hidden",
        }}
        onMouseEnter={e=>{ if(!editMode){ e.currentTarget.style.transform="scale(1.04)"; e.currentTarget.style.background="rgba(255,255,255,0.08)"; }}}
        onMouseLeave={e=>{ if(!editMode){ e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.background="rgba(255,255,255,0.04)"; }}}
      >
        {hasBadge && !editMode && (
          <div style={{ position:"absolute", top:7, right:9, background:"#EF4444", color:"white", borderRadius:10, padding:"2px 7px", fontSize:"0.58rem", fontWeight:900, zIndex:2, lineHeight:1.4, minWidth:18, textAlign:"center", boxShadow:"0 2px 6px rgba(0,0,0,.4)" }}>
            {card.badge}
          </div>
        )}
        {editMode && (
          <div style={{ position:"absolute", top:5, right:7, color:"rgba(255,255,255,.4)", fontSize:"0.9rem" }}>⠿</div>

        {hasBadge && card.badgeLabel && !editMode && (
          <div style={{ color:"rgba(255,255,255,.45)", fontSize:"0.55rem", fontWeight:700, textAlign:"center", marginTop:-4 }}>
            {card.badgeLabel}
          </div>
        )}
      </div>
      );
    })}
    </div>
  ))}
  </div>
  {editMode && <div style={{ color:"rgba(124,58,237,.7)", fontSize:"0.62rem", marginTop:14, fontWeight:700 }}>Húzd a kártyákat a kívánt sorrendbe →</div>}
</div>
);
}



function CardMenuWheel({ cards, onSelect, greeting, subtitle, initialIdx = 0, onIdxChange }) {
const screenH = window.innerHeight;
const VISIBLE = screenH < 750 ? 3 : 5;
const half = Math.floor(VISIBLE / 2);
const CARD_H = screenH < 700 ? 100 : screenH < 800 ? 115 : 140;
const GAP = screenH < 750 ? 10 : 12;
const STEP = CARD_H + GAP;
const CONTAINER_H = VISIBLE * STEP;
const N = cards.length;


const scrollPos = useRef(initialIdx * STEP);
const velocity  = useRef(0);
const rafId     = useRef(null);
const activeIdx = useRef(initialIdx);
const [tick, setTick] = useState(0);

const containerRef = useRef(null);
const dragY      = useRef(null);
const dragScroll = useRef(0);
const lastY      = useRef(0);
const lastT      = useRef(0);
const dragging   = useRef(false);
const cardsRef   = useRef(cards);
useEffect(() => { cardsRef.current = cards; }, [cards]);

const stopRaf = () => { if(rafId.current) { cancelAnimationFrame(rafId.current); rafId.current = null; } };

const wrapPos = (p) => {
const total = N * STEP;
return ((p % total) + total) % total;
};

const runInertia = () => {
stopRaf();
const loop = () => {
velocity.current *= 0.93; 
scrollPos.current += velocity.current;
scrollPos.current = wrapPos(scrollPos.current);

const nearest = Math.round(scrollPos.current / STEP) % N;
const clamped = (nearest + N) % N;
if(activeIdx.current !== clamped) {
activeIdx.current = clamped;
if(navigator.vibrate) navigator.vibrate(6);
if(onIdxChange) onIdxChange(clamped);
}
setTick(t => t + 1);

if(Math.abs(velocity.current) > 0.8) {
rafId.current = requestAnimationFrame(loop);
} else {

const target = clamped * STEP;

let diff = target - scrollPos.current;
const total = N * STEP;
if(diff >  total / 2) diff -= total;
if(diff < -total / 2) diff += total;
const snapLoop = () => {
const d = target - scrollPos.current;
let dd = d;
if(dd >  total/2) dd -= total;
if(dd < -total/2) dd += total;
if(Math.abs(dd) < 0.4) {
scrollPos.current = target;
setTick(t => t + 1);
return;
}
scrollPos.current = wrapPos(scrollPos.current + dd * 0.25);
setTick(t => t + 1);
rafId.current = requestAnimationFrame(snapLoop);
};
snapLoop();
}
};
rafId.current = requestAnimationFrame(loop);
};

const onDown = (e) => {
stopRaf();
const y = e.touches ? e.touches[0].clientY : e.clientY;
dragY.current = y; lastY.current = y; lastT.current = performance.now();
dragScroll.current = scrollPos.current;
velocity.current = 0;
dragging.current = true;
};
const onMove = (e) => {
if(!dragging.current) return;
const y = e.touches ? e.touches[0].clientY : e.clientY;
const now = performance.now();
const dt = Math.max(now - lastT.current, 1);
velocity.current = -(y - lastY.current) / dt * 16;
lastY.current = y; lastT.current = now;
scrollPos.current = wrapPos(dragScroll.current - (y - dragY.current));
setTick(t => t + 1);
};
const onUp = () => {
if(!dragging.current) return;
dragging.current = false;
runInertia();
};

useEffect(() => {
const el = containerRef.current;
if(!el) return;
const prevent = (e) => { if(dragging.current) e.preventDefault(); };
el.addEventListener("touchmove", prevent, { passive: false });
return () => el.removeEventListener("touchmove", prevent);
}, []);

useEffect(() => {
const el = containerRef.current;
if(!el) return;
const onWheel = (e) => {
e.preventDefault();
velocity.current += e.deltaY * 0.8;
runInertia();
};
el.addEventListener("wheel", onWheel, { passive: false });
return () => el.removeEventListener("wheel", onWheel);
}, [N]);

useEffect(() => {
const onKey = (e) => {
if(e.key === "ArrowUp")   { e.preventDefault(); velocity.current = -12; runInertia(); }
if(e.key === "ArrowDown") { e.preventDefault(); velocity.current =  12; runInertia(); }
if(e.key === "Enter")     { e.preventDefault(); onSelect(cardsRef.current[activeIdx.current].id); }
};
window.addEventListener("keydown", onKey);
return () => window.removeEventListener("keydown", onKey);
}, []);

useEffect(() => () => stopRaf(), []);

const sp = scrollPos.current;
const total = N * STEP;
const centerPx = half * STEP;

return (
<div style={{ display:"flex", flexDirection:"column", alignItems:"center", userSelect:"none", WebkitUserSelect:"none" }}>
<div style={{ textAlign:"center", marginBottom: screenH < 750 ? 10 : 16, marginTop: screenH < 750 ? 4 : 8 }}>
<div style={{ color:"rgba(255,255,255,.9)", fontWeight:900, fontSize:"1rem" }}>{greeting}</div>
{subtitle && <div style={{ color:"rgba(255,255,255,.45)", fontSize:"0.7rem", fontWeight:700, marginTop:2 }}>{subtitle}</div>}
</div>

<div
ref={containerRef}
style={{ position:"relative", width:"100%", maxWidth:340, height:CONTAINER_H, overflow:"hidden",
cursor: dragging.current ? "grabbing" : "grab", touchAction:"none" }}
onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
>
<div style={{ position:"absolute", left:0, right:0, top:centerPx, height:CARD_H,
background:"rgba(255,255,255,.06)", borderRadius:18,
border:"1.5px solid rgba(255,255,255,.15)", zIndex:0, pointerEvents:"none" }} />

{cards.map((card, idx) => {

let diff = (idx * STEP) - sp;

if(diff >  total / 2) diff -= total;
if(diff < -total / 2) diff += total;

const absOff = Math.abs(diff / STEP);
if(absOff > half + 0.6) return null;

const isActive = activeIdx.current === idx;
const scale   = 1 - Math.min(absOff, half) * 0.08;
const opacity = 1 - Math.min(absOff, half) * 0.4;

return (
<div
key={card.id}
onClick={() => {
if(!dragging.current) {
if(isActive) onSelect(card.id);
else { velocity.current = diff > 0 ? 6 : -6; runInertia(); }
}
}}
style={{
position:"absolute", left:0, right:0,
top: centerPx,
height: CARD_H,
transform: `translateY(${diff}px) scale(${scale})`,
opacity: Math.max(0, opacity),
background: isActive ? card.bg : "rgba(255,255,255,.05)",
borderRadius:24,
display:"flex", alignItems:"center", gap:18,
padding:"0 28px",
cursor:"pointer",
boxShadow: isActive ? "0 8px 32px rgba(0,0,0,.45), 0 0 0 1.5px rgba(255,255,255,.12)" : "none",
zIndex: Math.round((half + 1 - absOff) * 10),
overflow:"hidden",
willChange:"transform",
}}
>
{isActive && <>
<div style={{ position:"absolute", top:-20, right:-20, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,.08)", pointerEvents:"none" }}/>
<div style={{ position:"absolute", bottom:-15, left:-15, width:60, height:60, borderRadius:"50%", background:"rgba(255,255,255,.06)", pointerEvents:"none" }}/>
</>}
<div style={{ fontSize:"3rem", lineHeight:1, zIndex:1, flexShrink:0 }}>{card.emoji}</div>
<div style={{ flex:1, minWidth:0, zIndex:1 }}>
<div style={{ color: isActive ? "white" : "rgba(255,255,255,.6)", fontWeight:900, fontSize:"1.15rem", lineHeight:1.2 }}>{card.label}</div>
{card.badge !== "" && isActive && (
<div style={{ marginTop:6, display:"flex", alignItems:"center", gap:4 }}>
<span style={{ background:"rgba(0,0,0,.25)", borderRadius:20, padding:"3px 10px", color:"white", fontWeight:900, fontSize:"0.95rem" }}>{card.badge}</span>
{card.badgeLabel && <span style={{ color:"rgba(255,255,255,.6)", fontSize:"0.72rem", fontWeight:700 }}>{card.badgeLabel}</span>}
</div>
)}
</div>
{isActive && <div style={{ color:"rgba(255,255,255,.7)", fontSize:"1.1rem", flexShrink:0, zIndex:1 }}>›</div>}
</div>
);
})}
</div>
</div>
);
}

function TaskSuggestInput({ borderColor, placeholder, accentColor, onChipsChange }) {
const [chips, setChips] = useState([]);
const [query, setQuery] = useState("");
const [open, setOpen] = useState(false);
const wrapRef = useRef();
const inputRef = useRef();

useEffect(() => {
const handler = (e) => { if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
document.addEventListener("mousedown", handler);
return () => document.removeEventListener("mousedown", handler);
}, []);

const addChip = (val) => {
const trimmed = val.trim();
if(!trimmed || chips.includes(trimmed)) return;
const next = [...chips, trimmed];
setChips(next);
if(onChipsChange) onChipsChange(next);
setQuery(""); setOpen(false);
if(inputRef.current) inputRef.current.value = "";
};

const removeChip = (c) => {
const next = chips.filter(x=>x!==c);
setChips(next);
if(onChipsChange) onChipsChange(next);
};

const clearAll = () => { setChips([]); if(onChipsChange) onChipsChange([]); };

const filtered = query.length > 0
? getTaskSuggestions().flatMap(g => g.items.filter(i => i.toLowerCase().includes(query.toLowerCase())).map(i => ({group: g.group, item: i})))
: [];

const ac = accentColor || "#6366F1";

return (
<div ref={wrapRef} style={{ marginBottom:6, position:"relative" }}>
{chips.length > 0 && (
<div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:5 }}>
{chips.map(c => (
<div key={c} style={{ display:"flex", alignItems:"center", gap:3, background:ac, color:"white", borderRadius:20, padding:"3px 8px 3px 10px", fontSize:"0.7rem", fontWeight:900 }}>
<span>{c}</span>
<button onMouseDown={()=>removeChip(c)} style={{ background:"rgba(255,255,255,0.3)", border:"none", color:"white", borderRadius:"50%", width:14, height:14, fontSize:"0.55rem", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0, lineHeight:1 }}>✕</button>
</div>
))}
<button onMouseDown={clearAll} style={{ background:"none", border:"none", color:"#EF4444", fontSize:"0.62rem", fontWeight:900, cursor:"pointer", padding:"2px 4px" }}>Mind törlése</button>
</div>
)}
<div style={{ display:"flex", gap:4, position:"relative" }}>
<input ref={inputRef} value={query} placeholder={chips.length > 0 ? "＋ Add hozzá..." : placeholder}
onChange={e => { setQuery(e.target.value); setOpen(true); }}
onKeyDown={e => { if(e.key==="Enter" && query.trim()) { addChip(query); } }}
onBlur={e => { if(query.trim()) { addChip(query); } }}
style={{ flex:1, padding:"5px 7px", borderRadius:7, border:"none", fontWeight:700, fontSize:"0.85rem", outline:"none", background:"transparent", color:"white" }} />
<button type="button" onClick={()=>setOpen(o=>!o)}
style={{ background:"transparent", color:"#94a3b8", border:"none", borderRadius:7, padding:"5px 9px", fontWeight:900, fontSize:"0.85rem", cursor:"pointer", flexShrink:0 }}>▾</button>
</div>
{open && (
<div style={{ position:"absolute", zIndex:300, left:0, right:0, background:gc("input"), border:`1.5px solid ${gc("border")}`, borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,.4)", maxHeight:220, overflowY:"auto", marginTop:2 }}>
{query.length > 0 ? (
filtered.length === 0
? <div style={{ padding:"10px", color:"#64748b", fontSize:"0.7rem", textAlign:"center" }}>Nincs találat – nyomj Entert a hozzáadáshoz!</div>
: filtered.map((f,i) => (
<div key={i} onMouseDown={()=>addChip(f.item)}
style={{ padding:"6px 10px", cursor:"pointer", fontSize:"0.72rem", fontWeight:700, borderBottom:"1px solid #1a2d40", display:"flex", justifyContent:"space-between", alignItems:"center", background: chips.includes(f.item) ? "#0f2d1a" : gc("input"), color:"#e2e8f0" }}
onMouseEnter={e=>e.currentTarget.style.background=gc("dark")}
onMouseLeave={e=>e.currentTarget.style.background=chips.includes(f.item)?"#0f2d1a":gc("input")}>
<span>{f.item}</span>
<span style={{ color: chips.includes(f.item) ? ac : "#9CA3AF", fontSize:"0.6rem" }}>{chips.includes(f.item) ? "✓" : f.group}</span>
</div>
))
) : (
getTaskSuggestions().map(g => (
<div key={g.group}>
<div style={{ padding:"5px 10px 2px", fontSize:"0.6rem", fontWeight:900, color:"#94a3b8", textTransform:"uppercase", background:gc("dark"), letterSpacing:"0.05em" }}>{g.group}</div>
{g.items.map(item => (
<div key={item} onMouseDown={()=>addChip(item)}
style={{ padding:"5px 14px", cursor:"pointer", fontSize:"0.72rem", fontWeight:700, borderBottom:"1px solid #1a2d40", background: chips.includes(item) ? "#0f2d1a" : gc("input"), display:"flex", justifyContent:"space-between", color:"#e2e8f0" }}
onMouseEnter={e=>e.currentTarget.style.background=gc("dark")}
onMouseLeave={e=>e.currentTarget.style.background=chips.includes(item)?"#0f2d1a":gc("input")}>
<span>{item}</span>
{chips.includes(item) && <span style={{ color:ac, fontSize:"0.7rem" }}>✓</span>}
</div>
))}
</div>
))
)}
</div>
)}
</div>
);
}

const saveCardImage = async (file) => {
if(!file) return;
setUploadingBg(true);
try {
const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
const fileName = `cardbg_${user.id}_${Date.now()}_${Math.floor(Math.random()*9999)}.${ext}`;
const { error } = await _supabase.storage.from("avatars").upload(fileName, file, { contentType: file.type, upsert: false });
if(error) { console.error("Háttérkép feltöltés hiba:", error); alert("Feltöltés sikertelen: " + error.message); return; }
const { data: urlData } = _supabase.storage.from("avatars").getPublicUrl(fileName);
const url = urlData.publicUrl;
updateData(profiles.map(p => p.id === user.id ? { ...p, cardImage: url } : p));
showSaved();
} catch(e) {
console.error("Háttérkép hiba:", e);
alert("Hiba történt: " + e.message);
} finally {
setUploadingBg(false);
}
};

const fileName = parts[1].split("?")[0];

await _supabase.storage.from("avatars").remove([fileName]);

} catch(e) { console.warn("Háttérkép törlési hiba:", e); }

};

function PickerPane({ slotIdx, profiles, usedIds, onSelect, events, pinFlow, setPinFlow, pinInput, setPinInput, setSlots }) {
const available = profiles.filter(p => !usedIds.includes(p.id));
const adminIdx = available.findIndex(p => p.isAdmin);
const [activeIdx, setActiveIdx] = useState(adminIdx >= 0 ? adminIdx : 0);
const [dragging, setDragging] = useState(false);
const startX = useRef(null);
const containerRef = useRef(null);

const VISIBLE = 5;

const half = Math.floor(VISIBLE / 2);


useEffect(() => {
if(available.length > 0 && activeIdx >= available.length) setActiveIdx(available.length - 1);
}, [available.length]);

const getOffset = (idx) => {
let diff = idx - activeIdx;
if(diff > available.length / 2) diff -= available.length;
if(diff < -available.length / 2) diff += available.length;
return diff;
};

const go = (dir) => {
setActiveIdx(i => (i + dir + available.length) % available.length);
if(navigator.vibrate) navigator.vibrate(18);
};


useEffect(() => {
const el = containerRef.current;
if(!el) return;
const handleWheel = (e) => { e.preventDefault(); go(e.deltaX > 0 || e.deltaY > 0 ? 1 : -1); };
const handleTouchMove = (e) => {
if(startX.current === null) return;
const dx = (e.touches ? e.touches[0].clientX : e.clientX) - startX.current;
if(Math.abs(dx) > 8) e.preventDefault();
};
el.addEventListener("wheel", handleWheel, { passive: false });
el.addEventListener("touchmove", handleTouchMove, { passive: false });
return () => { el.removeEventListener("wheel", handleWheel); el.removeEventListener("touchmove", handleTouchMove); };
}, [activeIdx, available.length]);


const availableLenRef = useRef(available.length);
useEffect(() => { availableLenRef.current = available.length; }, [available.length]);
useEffect(() => {
const handleKey = (e) => {
const len = availableLenRef.current;
if(len <= 1) return;
if(e.key === "ArrowLeft")  { e.preventDefault(); setActiveIdx(i => (i - 1 + len) % len); if(navigator.vibrate) navigator.vibrate(18); }
if(e.key === "ArrowRight") { e.preventDefault(); setActiveIdx(i => (i + 1) % len); if(navigator.vibrate) navigator.vibrate(18); }
if(e.key === "Enter")      { e.preventDefault(); setActiveIdx(i => { onSelect(available[i], slotIdx); return i; }); }
};
window.addEventListener("keydown", handleKey);
return () => window.removeEventListener("keydown", handleKey);
}, []);

const onTouchStart = (e) => {
startX.current = e.touches ? e.touches[0].clientX : e.clientX;
setDragging(true);
};
const onTouchEnd = (e) => {
if(startX.current === null) { setDragging(false); return; }
const dx = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - startX.current;
if(Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
startX.current = null;
setDragging(false);
};

const CARD_W = Math.min(220, Math.floor(window.innerWidth * 0.55));
const GAP = 14;

const CONTAINER_W = VISIBLE * STEP;

const getFiredAlarms = (p) => (events||[]).filter(ev => ev.alarmFired && (ev.assignedTo === p.id || ev.createdBy === p.id || !ev.assignedTo));

<div style={{ position:"fixed", pointerEvents:"none", zIndex:0, width:360, height:220, left:-20, bottom:-20,

  backgroundSize:"42px 42px", opacity:0.7
}} />

{/* FEJLÉC */}
<div style={{ position:"relative", zIndex:2, width:"100%", textAlign:"center", paddingTop:"max(8px,env(safe-area-inset-top))", paddingBottom:2 }}>
  <div className="picker-title" style={{ fontWeight:800, letterSpacing:1, color:"white" }}>CSALÁDI FELADATKEZELŐ</div>
</div>

{/* KI VAGY MA? – eltávolítva */}

{available.length === 0 ? (
  <div style={{ color:"rgba(255,255,255,.4)", fontSize:"1rem", fontWeight:700, textAlign:"center", zIndex:2, position:"relative", flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>Minden profil már aktív</div>
) : (
<div style={{ position:"relative", zIndex:2, width:"100%", flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}
  ref={containerRef}
  onTouchStart={onTouchStart}
  onTouchEnd={onTouchEnd}
  onMouseDown={onTouchStart}
  onMouseMove={e=>{ if(dragging && startX.current !== null) { const dx = e.clientX - startX.current; if(Math.abs(dx) > 8) e.preventDefault(); } }}
  onMouseUp={onTouchEnd}
  onMouseLeave={onTouchEnd}
>
  {/* GLOW KÖRÖK */}
  <div style={{ position:"absolute", pointerEvents:"none", zIndex:0,
    width:"min(520px,90vw)", height:"min(520px,90vw)", borderRadius:"50%",
    left:"50%", top:"50%", transform:"translate(-50%,-50%)",
    background:"radial-gradient(circle,rgba(0,140,255,0) 0%,rgba(0,140,255,0) 49%,rgba(0,140,255,0.03) 56%,rgba(0,140,255,0.12) 61%,rgba(0,140,255,0.16) 64%,rgba(0,140,255,0.08) 67%,rgba(0,140,255,0.025) 72%,transparent 78%)",
    filter:"blur(2px)"
  }} />
  <div style={{ position:"absolute", pointerEvents:"none", zIndex:0,
    width:"min(400px,70vw)", height:"min(400px,70vw)", borderRadius:"50%",
    left:"50%", top:"50%", transform:"translate(-50%,-50%)",
    border:"1px solid rgba(0,162,255,0.06)",
    boxShadow:"0 0 80px rgba(0,162,255,0.07),inset 0 0 60px rgba(0,162,255,0.03)"
  }} />

  {/* 3D WHEEL */}
  {(() => {
    const n = available.length;
    // Hány kártyát látunk egyszerre (max 5, de legalább n)
    const CARD_W = Math.min(280, Math.floor(window.innerWidth * 0.38));
    const CARD_H = Math.floor(CARD_W * 1.52);
    const RADIUS = Math.max(CARD_W * 1.1, n <= 3 ? CARD_W * 1.2 : CARD_W * 1.5);
    const angleStep = 360 / n;

    return (
    <div style={{ position:"relative", width:"100%", height: CARD_H + 60, display:"flex", justifyContent:"center", alignItems:"center" }}>
      <div style={{ position:"relative", width:CARD_W, height:CARD_H, transformStyle:"preserve-3d", perspective:1200 }}>
        {available.map((profile, idx) => {
          const offset = getOffset(idx);
          const angleDeg = offset * angleStep;
          const angleRad = angleDeg * Math.PI / 180;
          const tx = Math.sin(angleRad) * RADIUS;
          const tz = Math.cos(angleRad) * RADIUS - RADIUS;
          const isActive = offset === 0;
          const absOff = Math.abs(offset);
          // csak -2..+2 offset-eket jelenítünk meg
          if(absOff > 2 && n > 5) return null;
          const opacity = isActive ? 1 : absOff === 1 ? 0.65 : 0.35;
          const scale = isActive ? 1 : absOff === 1 ? 0.82 : 0.65;
          const rotY = -angleDeg;
          const zIdx = 10 - absOff;
          const firedAlarms = getFiredAlarms(profile);
          const hasFired = firedAlarms.length > 0;

          // kártya szín/border
          let border, boxShadow;
          if(isActive)         { border="2px solid #53b8ff"; boxShadow="0 0 24px rgba(83,184,255,0.9),0 0 90px rgba(83,184,255,0.28)"; }
          else if(offset===-1) { border="2px solid #d98cff"; boxShadow="0 0 18px rgba(217,140,255,0.6),0 0 45px rgba(217,140,255,0.22)"; }
          else if(offset===1)  { border="2px solid #ffcc74"; boxShadow="0 0 18px rgba(255,204,116,0.5),0 0 45px rgba(255,204,116,0.16)"; }
          else                 { border="1px solid rgba(255,255,255,.15)"; boxShadow="none"; }

          return (
          <div key={profile.id}
            className="picker-wheel-card"
            onClick={() => { if(isActive) onSelect(profile, slotIdx); else setActiveIdx(idx); }}
            style={{
              position:"absolute", top:0, left:0,
              width:CARD_W, height:CARD_H,
              borderRadius:30,
              background:"linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.05))",
              backdropFilter:"blur(18px)", WebkitBackdropFilter:"blur(18px)",
              border, boxShadow,
              display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center",
              cursor: isActive ? "pointer" : "pointer",
              opacity,
              transform:`translateX(${tx}px) translateZ(${tz}px) rotateY(${rotY}deg) scale(${scale})`,
              transformOrigin:"center center",
              zIndex: zIdx,
              overflow:"hidden",
            }}>

            {/* felső fény nem aktív kártyákon */}
            {!isActive && <div style={{ position:"absolute", inset:0, background:"linear-gradient(180deg,rgba(255,255,255,0.07),transparent 45%)", pointerEvents:"none" }} />}

            {/* piros badge */}
            {isActive && hasFired && (
              <div style={{ position:"absolute", top:12, right:12, background:"#EF4444", color:"white", borderRadius:"50%", width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.9rem", fontWeight:900, zIndex:10 }}>!</div>
            )}

            {/* AVATAR */}
            <div style={{ lineHeight:1, marginTop: isActive ? 10 : 0, marginBottom: isActive ? 14 : 0, position:"relative", zIndex:2, filter: isActive ? "drop-shadow(0 6px 22px rgba(0,0,0,.55))" : "none", display:"flex", justifyContent:"center" }}>
              <AvatarImg avatar={profile.avatar} size={isActive ? 90 : 62} />
            </div>

            {/* NÉV */}
            <div style={{ marginTop: isActive ? 12 : 16, fontSize: isActive ? "1.15rem" : "0.82rem", fontWeight:900, color:"white", position:"relative", zIndex:2, textAlign:"center", letterSpacing:"0.04em", textTransform:"uppercase" }}>
              {profile.name}
            </div>

            {/* ARANY – csak gyereknél */}
            {isActive && !profile.isAdmin && !profile.isCoAdmin && (
              <div style={{ marginTop:10, background:"rgba(255,255,255,.15)", borderRadius:20, padding:"4px 16px", zIndex:2, position:"relative" }}>
                <span style={{ color:"#FCD34D", fontSize:"1rem", fontWeight:900 }}>🪙 {profile.gold}</span>
              </div>
            )}

            {/* PIN BEVITEL VAGY BELÉPÉS GOMB */}
            {isActive && pinFlow && pinFlow.profile.id === profile.id ? (
              <>
                <div style={{ color:"rgba(255,255,255,.55)", fontSize:"0.55rem", marginTop:14, marginBottom:6, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.1em", position:"relative", zIndex:2, textAlign:"center" }}>
                  Add meg a 4 jegyű PIN kódot
                </div>
                <input type="password" inputMode="numeric" pattern="[0-9]*" autoFocus maxLength="4" autoComplete="off"
                  onClick={e=>e.stopPropagation()}
                  style={{ fontSize:"1.8rem", textAlign:"center", border:"none", borderBottom:"2px solid white", background:"transparent", color:"white", width:100, outline:"none", letterSpacing:"0.3em", marginBottom:10, position:"relative", zIndex:2 }}
                  value={pinInput}
                  onChange={e=>{
                    const v=e.target.value.replace(/\D/g,"");
                    setPinInput(v);
                    if(v===pinFlow.profile.pin){
                      setSlots(prev=>{ const n=[...prev]; n[pinFlow.slot]=pinFlow.profile.id; return n; });
                      setPinFlow(null); setPinInput("");
                    }
                  }} />
                <button onClick={e=>{ e.stopPropagation(); setPinFlow(null); setPinInput(""); }}
                  style={{ color:"rgba(255,255,255,.5)", background:"none", border:"none", fontWeight:900, fontSize:"0.6rem", cursor:"pointer", textTransform:"uppercase", letterSpacing:"0.08em", position:"relative", zIndex:2 }}>
                  ↩ Vissza
                </button>
              </>
            ) : (
              <>

                {/* LEJÁRT ALARM */}
                {isActive && hasFired && (
                  <div style={{ marginTop:8, background:"rgba(239,68,68,.25)", borderRadius:10, padding:"5px 14px", fontSize:"0.72rem", color:"#FCA5A5", fontWeight:900, zIndex:2, position:"relative" }}>
                    🔔 {firedAlarms.length} lejárt emlékeztető
                  </div>
                )}

                {/* BELÉPÉS GOMB */}
                {isActive && (
                  <button className="picker-login-btn" onClick={e=>{ e.stopPropagation(); onSelect(profile, slotIdx); }}
                    style={{ marginTop:18, border:"none", padding:"6px 16px", borderRadius:999, background:"linear-gradient(90deg,#b84eff 0%,#7a4dff 100%)", color:"white", fontSize:"0.7rem", fontWeight:800, cursor:"pointer", position:"relative", zIndex:2 }}>
                    Belépés →
                  </button>
                )}
              </>
            )}

            {/* NYÍL nem aktív – eltávolítva */}
          </div>
          );
        })}
      </div>
    </div>
    );
  })()}

  {/* NAVIGÁCIÓS NYILAK + PONTSOR – eltávolítva */}

</div>
)}

{/* ALSÓ SZÖVEG */}
<div style={{ position:"relative", zIndex:2, textAlign:"center", marginTop:"auto", marginBottom:24, fontSize:"clamp(0.5rem,1vw,0.75rem)", color:"rgba(255,255,255,0.55)", fontWeight:500, paddingBottom:"max(24px,env(safe-area-inset-bottom))" }}>

</div>
);
}
