<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="HandheldFriendly" content="true">
  <meta name="MobileOptimized" content="width">
  <title>Családi Feladatkezelő</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Feladatkezelő">
  <meta name="application-name" content="Feladatkezelő">
  <meta name="theme-color" content="#001226">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <style>
        /* ══ GLASS TÉMA CSS VÁLTOZÓK ══ */
        :root {
            --bg-deep:    #001a33;
            --bg-card:    #1e2a3a;
            --bg-input:   #0f1f30;
            --bg-dark:    #162030;
            --border-col: #2d4057;
        }
        /* Modern glass téma – minden sötét konténert átír */
        body.modern-theme {
            background: #090f1a !important;
        }
        body.modern-theme .pane {
            background: transparent !important;
        }
        body.modern-theme .day-btn {
            background: #111c2a !important;
            border-color: #2a3a50 !important;
            color: #e2e8f0 !important;
        }
        body.modern-theme input[type="text"],
        body.modern-theme input[type="password"],
        body.modern-theme select,
        body.modern-theme textarea {
            background: #111c2a !important;
            border-color: #2a3a50 !important;
            color: #e2e8f0 !important;
        }
        body.modern-theme input[type="date"],
        body.modern-theme input[type="time"] {
            background: transparent !important;
            border: none !important;
            color: #e2e8f0 !important;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            background-color: transparent !important;
            background-image: none !important;
            filter: invert(1) opacity(0.7) !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        body.modern-theme input[type="date"]::-webkit-calendar-picker-indicator,
        body.modern-theme input[type="time"]::-webkit-calendar-picker-indicator {
            background-color: transparent !important;
            background-image: none !important;
            filter: invert(1) opacity(0.7) !important;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; touch-action: manipulation; background: #090f1a; background-attachment:fixed; }
        body {
          background-image: url('https://uxwigmwdihbcfhyeywpu.supabase.co/storage/v1/object/public/backgrounds/backgroundsmobil.png');
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
        }
        @media (min-width: 768px) {
          body {
            background-image: url('https://uxwigmwdihbcfhyeywpu.supabase.co/storage/v1/object/public/backgrounds/backgroundspc.png');
          }
        }
        body::before {
          content: "";
          position: fixed;
          inset: 0;
          background: rgba(5, 10, 25, 0.10);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(10px);
          z-index: 0;
          pointer-events: none;
        }
        #root { height: 100%; position: relative; z-index: 1; }
        .dual-wrap { display: flex; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; }
        .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .pane-header { padding: 6px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        @media (pointer: coarse) {
            .pane-header { padding: 6px 10px; margin-top: env(safe-area-inset-top, 0px); }
            .pane-header img { width: 28px !important; height: 28px !important; }
            .pane-header span[style] { font-size: 1.4rem !important; }
            .pane-header-name { font-size: 0.65rem !important; letter-spacing: 0.05em !important; }
            .pane-header-title { font-size: 0.78rem !important; letter-spacing: 0.04em !important; white-space: normal !important; overflow: visible !important; text-overflow: unset !important; }
            .pane-header button { font-size: 0.55rem !important; padding: 4px 7px !important; min-height: 38px !important; min-width: 38px !important; }
            .copyright-bar { display: none !important; }
            .mobile-hide { display: none !important; }
            .mobile-btn-left {
                position: fixed; bottom: max(10px, env(safe-area-inset-bottom)); left: 10px;
                display: flex; gap: 8px; z-index: 300;
            }
            .mobile-btn-right {
                position: fixed; bottom: max(10px, env(safe-area-inset-bottom)); right: 10px;
                z-index: 300;
            }
        }
        /* ── TELEFON SPECIFIKUS (max 480px) ── */
        @media (max-width: 480px) {
            .pane-header { padding: 6px 8px !important; }
            .pane-scroll { padding: 8px 8px calc(70px + env(safe-area-inset-bottom)) !important; }
            .sc { margin-bottom: 0.4rem !important; }
        }
        @media (pointer: fine) {
            .mobile-btn-left, .mobile-btn-right { display: none !important; }
        }
        .pane-scroll { flex: 1; overflow-y: auto; padding: 10px 12px calc(72px + env(safe-area-inset-bottom)); font-size: 1rem; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        .pane-scroll::-webkit-scrollbar { width: 3px; }
        .pane-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }
        /* ── Kék blur + kék border az almenük doboz elemeire ── */
        /* A React inline style={{ borderRadius: 20 }} HTML-ben "border-radius: 20px;"-szé renderelődik */
        /* Csak elég nagy borderRadius-nál (kártya-szerű), elkerüli a kerek avatar / pill / gomb elemeket */
        .pane-scroll div[style*="border-radius: 10px"],
        .pane-scroll div[style*="border-radius: 12px"],
        .pane-scroll div[style*="border-radius: 14px"],
        .pane-scroll div[style*="border-radius: 16px"],
        .pane-scroll div[style*="border-radius: 18px"],
        .pane-scroll div[style*="border-radius: 20px"],
        .pane-scroll div[style*="border-radius: 22px"],
        .pane-scroll div[style*="border-radius: 24px"],
        .pane-scroll div[style*="border-radius: 26px"],
        .pane-scroll div[style*="border-radius: 28px"],
        .pane-scroll div[style*="border-radius: 30px"],
        .pane-scroll div[style*="border-radius: 32px"],
        .pane-scroll div[style*="border-radius: 34px"],
        .pane-scroll div[style*="border-radius: 36px"],
        .pane-scroll div[style*="border-radius: 38px"],
        .pane-scroll div[style*="border-radius: 40px"],
        .pane-scroll div[style*="border-radius: 1rem"],
        .pane-scroll div[style*="border-radius: 1.2rem"],
        .pane-scroll div[style*="border-radius: 1.5rem"],
        .pane-scroll div[style*="border-radius: 2rem"],
        .pane-scroll .nj-task,
        .pane-scroll .nj-task.error,
        .pane-scroll .nj-task.green,
        .pane-scroll .nj-task.green.success,
        .pane-scroll .nj-task.blue,
        .pane-scroll .nj-task.blue.success,
        .pane-scroll .nj-task.yellow,
        .pane-scroll .nj-task.yellow.success {
          box-shadow: 0 0 18px rgba(14,165,233,0.32), 0 0 40px rgba(14,165,233,0.22) !important;
          border: 1px solid #0EA5E9 !important;
        }
        .sc { background: rgba(255,255,255,0.08); border-radius: 1rem; margin-bottom: .55rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.18); box-shadow: inset 0 1px 8px rgba(255,255,255,0.1), 0 4px 24px rgba(0,0,0,0.25); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: background .3s, border .3s, box-shadow .3s; }
        body.modern-theme .sc { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.18) !important; box-shadow: inset 0 1px 8px rgba(255,255,255,0.1), 0 4px 24px rgba(0,0,0,0.25) !important; backdrop-filter: blur(16px) !important; -webkit-backdrop-filter: blur(16px) !important; }
        .chat-msg-area::-webkit-scrollbar { display: none; }
        .chat-msg-area { scrollbar-width: none; -ms-overflow-style: none; }
        .task-img { height: 65px; background: #7C3AED; position: relative; background-size: cover; background-position: center; }
        .day-btn { border-radius: 6px; border: 2px solid #3a4a5c; font-size: 7.5px; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: #cbd5e1; background: #162030; min-width: 34px; min-height: 34px; width: 34px; height: 34px; touch-action: manipulation; }
        .day-btn.active { background: #7C3AED; color: white; border-color: #7C3AED; }
        .pin-overlay { position: fixed; inset: 0; background: rgba(0,5,26,.93); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; overflow-y: auto; padding: 20px; }
        .pick-card { border-radius: 1.2rem; cursor: pointer; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: transform .15s; padding: 20px 14px; width: 100%; max-width: 200px; touch-action: manipulation; }
        .pick-card:active { transform: scale(0.94); opacity: 0.85; }

        /* ── GOMBOK ── */
        button { touch-action: manipulation; cursor: pointer; user-select: none; -webkit-user-select: none; }
        button:active { opacity: 0.75; transform: scale(0.96); transition: transform 0.1s, opacity 0.1s; }
        .pick-card:hover { transform: scale(1.05); }

        /* ── TOUCH ROW ── */
        .touch-row { min-height: 52px; display: flex; align-items: center; }
        .tap-active:active { opacity: 0.7; transform: scale(0.97); transition: transform 0.1s, opacity 0.1s; }

        /* ── RESZPONZÍV KÁRTYARÁCS ── */
        .menu-grid { display: grid; gap: 14px; justify-content: center; width: 100%; padding: 0 8px; }

        /* ── INPUT MEZŐK ── */
        input, select, textarea { font-size: 16px !important; touch-action: manipulation; }
        input[type="text"], input[type="password"], input[type="date"], input[type="time"], select, textarea {
            background: #0f1f30 !important; color: #e2e8f0 !important; border-color: #2d4057 !important;
        }
        input[type="text"]::placeholder, textarea::placeholder, input::placeholder { color: rgba(255,255,255,0.5) !important; }
        input[type="time"] { color-scheme: dark !important; color: #ffffff !important; font-size: 1rem !important; font-weight: 700 !important; }
        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(2) !important; cursor: pointer; width: 20px; height: 20px; opacity: 1 !important; background-color: transparent !important;
        }
        input[type="file"] { color: #94a3b8; }
        option { background: #162030 !important; color: #e2e8f0 !important; }

        /* ── ASZTALI (pointer:fine) ── */
        @media (pointer: fine) {
            .menu-grid { grid-template-columns: 1fr; max-width: 340px; margin: 0 auto; }
            .menu-card { width: 100%; height: 110px; }
            button { min-height: 36px; }
        }

        /* ── ÉRINTŐKÉPERNYŐ (pointer:coarse) ── */
        @media (pointer: coarse) {
            .pane-scroll::-webkit-scrollbar { display: none; }
            button { min-height: 44px; }
            .day-btn { min-width: 38px; min-height: 38px; width: 38px; height: 38px; font-size: 9px !important; }
            .menu-grid { grid-template-columns: 1fr; max-width: 340px; margin: 0 auto; }
            .menu-card { width: 100% !important; height: 110px !important; }
            .sc { border-radius: 0.8rem; }
            .pick-card { max-width: 160px; padding: 16px 10px; }
        }

        /* ── KIS KÉPERNYŐ (max 400px) ── */
        @media (max-width: 400px) {
            .menu-grid { grid-template-columns: 1fr; max-width: 320px; margin: 0 auto; gap: 10px; padding: 0 6px; }
            .menu-card { height: 100px !important; }
            .pane-scroll { padding: 8px 10px 80px; }
        }

        /* ── SCROLLBAR ELREJTÉS MOBILON ── */
        @media (pointer: coarse) {
            * { scrollbar-width: none; }
            *::-webkit-scrollbar { display: none; }
            .dict-wordlist { scrollbar-width: thin !important; scrollbar-color: #d5d5d5 rgba(255,255,255,.10) !important; }
            .dict-wordlist::-webkit-scrollbar { display: block !important; width: 10px !important; }
            .dict-wordlist::-webkit-scrollbar-track { background: rgba(255,255,255,.10) !important; border-radius: 999px !important; }
            .dict-wordlist::-webkit-scrollbar-thumb { background: #d5d5d5 !important; border-radius: 999px !important; }
        }

        /* ── CHAT ÜZENETLISTA SCROLLBAR ELREJTÉS ── */
        .chat-messages::-webkit-scrollbar { display: none; }

        /* ── SZÓTÁR SZÓLISTA SCROLLBAR ── */
        .dict-wordlist::-webkit-scrollbar { width: 10px; }
        .dict-wordlist::-webkit-scrollbar-track { background: rgba(255,255,255,.10); border-radius: 999px; }
        .dict-wordlist::-webkit-scrollbar-thumb { background: #d5d5d5; border-radius: 999px; }
        .dict-wordlist { scrollbar-width: thin; scrollbar-color: #d5d5d5 rgba(255,255,255,.10); }

        /* ── MOBIL MENÜKÁRTYA OPTIMALIZÁLÁS ── */
        @media (max-width: 480px) {
            .drag-card { padding: 12px 14px !important; border-radius: 14px !important; }
            .drag-card-icon { width: 40px !important; height: 40px !important; border-radius: 10px !important; font-size: 20px !important; }
            .drag-card-label { font-size: 0.9rem !important; }
            .drag-card-gap { gap: 12px !important; }
        }

        /* ══════════════════════════════════════════════════════
           MOBIL OPTIMALIZÁCIÓ – KIBŐVÍTETT SZABÁLYOK
           ══════════════════════════════════════════════════════ */

        /* ── Biztonságos terület kezelés minden irányon ── */
        @supports (padding: max(0px)) {
            .pane-header {
                padding-top: max(6px, env(safe-area-inset-top)) !important;
                padding-left: max(8px, env(safe-area-inset-left)) !important;
                padding-right: max(8px, env(safe-area-inset-right)) !important;
            }
            .mobile-btn-left {
                left: max(10px, env(safe-area-inset-left)) !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
            }
            .mobile-btn-right {
                right: max(10px, env(safe-area-inset-right)) !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
            }
            .pane-scroll {
                padding-bottom: max(80px, calc(60px + env(safe-area-inset-bottom))) !important;
            }
        }

        /* ── Érintési célterületek növelése – minimum 44×44pt ── */
        @media (pointer: coarse) {
            /* Minden gomb és interaktív elem legalább 44px magas/széles legyen */
            button,
            [role="button"],
            .tap-active,
            .touch-row {
                min-height: 44px !important;
                min-width: 44px !important;
            }
            /* Nap-gombok mobilon nagyobbak */
            .day-btn {
                min-width: 40px !important;
                min-height: 40px !important;
                width: 40px !important;
                height: 40px !important;
                font-size: 9px !important;
                border-radius: 8px !important;
            }
            /* Kártyák közötti rés nagyobb mobilon a könnyebb koppintáshoz */
            .sc { margin-bottom: 0.6rem !important; }
            /* Beviteli mezők – ne zoomoljon az iOS */
            input, select, textarea { font-size: 16px !important; }
            /* Pane-scroll padding a lebegő gombokhoz */
            .pane-scroll {
                padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)) !important;
            }
            /* Header jobb oldali gombok mérete mobilon */
            .pane-header button {
                min-height: 44px !important;
                min-width: 44px !important;
                padding: 8px 12px !important;
                font-size: 0.7rem !important;
            }
        }

        /* ── Kis képernyő (max 390px – pl. iPhone SE, régi Android) ── */
        @media (max-width: 390px) {
            .pane-header { padding: 4px 6px !important; }
            .pane-header-name { font-size: 0.6rem !important; max-width: 80px !important; }
            .pane-header-title { font-size: 0.6rem !important; }
            .menu-grid { gap: 8px !important; padding: 0 4px !important; }
            .menu-card { height: 90px !important; }
            .sc { border-radius: 0.7rem !important; margin-bottom: 0.35rem !important; }
            .day-btn { width: 36px !important; height: 36px !important; min-width: 36px !important; min-height: 36px !important; font-size: 8px !important; }
            .pick-card { max-width: 140px !important; padding: 12px 8px !important; }
        }

        /* ── Közepes mobilképernyő (391–480px) ── */
        @media (min-width: 391px) and (max-width: 480px) {
            .menu-grid { grid-template-columns: 1fr !important; max-width: 360px !important; margin: 0 auto !important; gap: 10px !important; }
            .menu-card { height: 100px !important; }
            .pane-scroll { padding: 8px 10px calc(80px + env(safe-area-inset-bottom, 0px)) !important; }
        }

        /* ── Nagy mobilképernyő (481–767px – nagy Android, iPhone Pro Max) ── */
        @media (min-width: 481px) and (max-width: 767px) {
            .menu-grid { grid-template-columns: 1fr 1fr !important; max-width: 600px !important; margin: 0 auto !important; gap: 12px !important; }
            .menu-card { height: 110px !important; }
        }

        /* ── Tájképi mód mobilon (landscape, max 480px magasság) ── */
        @media (max-height: 480px) and (orientation: landscape) {
            .pane-header { padding: 2px 8px !important; min-height: 40px !important; }
            .pane-header img { width: 24px !important; height: 24px !important; }
            .copyright-bar { display: none !important; }
            .pane-scroll { padding-top: 6px !important; padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)) !important; }
            .sc { margin-bottom: 0.3rem !important; }
            .mobile-btn-left, .mobile-btn-right { bottom: max(8px, env(safe-area-inset-bottom)) !important; }
            .pick-card { padding: 10px 8px !important; max-width: 130px !important; }
            .menu-card { height: 80px !important; }
        }

        /* ── Szöveg méretezés mobilon ── */
        @media (max-width: 480px) {
            /* Általános szövegsűrítés kis képernyőn */
            .pane-scroll { font-size: 0.92rem !important; }
            /* Nagyobb gomb-szöveg az olvashatósághoz */
            .mobile-btn-left button, .mobile-btn-right button {
                font-size: 0.72rem !important;
                padding: 11px 16px !important;
                border-radius: 12px !important;
                box-shadow: 0 4px 20px rgba(0,0,0,.6) !important;
            }
        }

        /* ── Overflow és scroll javítások mobilon ── */
        @media (pointer: coarse) {
            /* Vízszintes görgetés a nap-gombokhoz */
            .day-btns-wrap {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch !important;
                padding-bottom: 4px !important;
                scrollbar-width: none !important;
            }
            .day-btns-wrap::-webkit-scrollbar { display: none !important; }
            /* Akadálymentesség: aktív terület jelzése */
            .pick-card:active, button:active {
                opacity: 0.75 !important;
                transform: scale(0.95) !important;
            }
            /* Chat beviteli mező mobilon */
            .chat-input-wrap {
                padding-bottom: max(12px, env(safe-area-inset-bottom)) !important;
            }
        }

        /* ── Pin overlay mobilon ── */
        @media (max-width: 480px) {
            .pin-overlay {
                padding: 12px 10px !important;
                align-items: center !important;
            }
            .pick-card {
                max-width: 145px !important;
                padding: 14px 10px !important;
            }
        }

        /* ── Lebegő gombok (mobile-btn) – jobb elhelyezés ── */
        @media (pointer: coarse) {
            .mobile-btn-left {
                position: fixed !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
                left: max(10px, env(safe-area-inset-left)) !important;
                display: flex !important;
                gap: 8px !important;
                z-index: 300 !important;
            }
            .mobile-btn-right {
                position: fixed !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
                right: max(10px, env(safe-area-inset-right)) !important;
                z-index: 300 !important;
            }
            /* Gombok árnyéka jobban látszik sötét háttéren */
            .mobile-btn-left button,
            .mobile-btn-right button {
                box-shadow: 0 4px 20px rgba(0,0,0,.65), 0 1px 4px rgba(0,0,0,.4) !important;
                backdrop-filter: blur(8px) !important;
                -webkit-backdrop-filter: blur(8px) !important;
            }
        }

        /* ── Értesítési modal mobilon – teljesebb lefedés ── */
        @media (max-width: 480px) {
            /* A taskNotif és globalAlert modalok jobb megjelenítése mobilon */
            .mobile-modal-inner {
                max-height: 90vh !important;
                overflow-y: auto !important;
                border-radius: 1.2rem !important;
            }
        }

        /* ── Képernyő-olvasó és akadálymentesség ── */
        @media (prefers-reduced-motion: reduce) {
            button:active, .pick-card:active, .tap-active:active {
                transform: none !important;
                transition: none !important;
            }
        }

        /* ── Panel méret szabályozás ── */
        /* Asztali: az App.jsx-ben minden panelnél transform:"scale(1)" → változtasd tetszés szerint */
        /* Mobilon külön méret az alábbi osztályoknál: */
        @media (max-width: 480px) {
            /* NAPI JELENTÉS panel */
            .jelentes-panel { transform: scale(0.85) !important; transform-origin: top center !important; }
            /* RUTINOK panel */
            .rutinok-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* FELADATOK panel */
            .feladatok-panel { transform: scale(1) !important; transform-origin: top center !important; }
            /* ARANY panel */

const audioCtxRef = useRef(null);
const TIME_PER_Q = 20;

function getCtx() {
if(!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
return audioCtxRef.current;
}

function playTone(freq, type, duration, gainVal, startTime, ctx) {
const o = ctx.createOscillator();
const g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.type = type; o.frequency.setValueAtTime(freq, startTime);
g.gain.setValueAtTime(gainVal, startTime);
g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
o.start(startTime); o.stop(startTime + duration);
}

function soundCorrect() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(523, "sine", 0.12, 0.4, t,       ctx);
playTone(659, "sine", 0.12, 0.4, t+0.13,  ctx);
playTone(784, "sine", 0.22, 0.4, t+0.26,  ctx);
}

function soundWrong() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(300, "sawtooth", 0.15, 0.3, t,      ctx);
playTone(220, "sawtooth", 0.25, 0.3, t+0.16, ctx);
}

function soundTick() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(880, "square", 0.04, 0.15, t, ctx);
}

function soundUrgent() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(440, "square", 0.08, 0.35, t,      ctx);
playTone(440, "square", 0.08, 0.35, t+0.12, ctx);
playTone(440, "square", 0.08, 0.35, t+0.24, ctx);
}

function soundFanfare() {
const ctx = getCtx(); const t = ctx.currentTime;
const notes = [523,659,784,1047,784,1047];
const times = [0, 0.15, 0.30, 0.45, 0.65, 0.80];
notes.forEach((f,i) => playTone(f, "sine", 0.25, 0.5, t+times[i], ctx));
}

function soundTimeout() {
const ctx = getCtx(); const t = ctx.currentTime;
playTone(200, "sawtooth", 0.4, 0.4, t, ctx);
}

useEffect(() => {
if(phase === "playing" && selected === null) {
setTimer(TIME_PER_Q);
let lastTick = TIME_PER_Q;
timerRef.current = setInterval(() => {
setTimer(t => {
if(t <= 1) {
clearInterval(timerRef.current);
soundTimeout();
handleAnswer(null);
return 0;
}
if(t <= 5 && t !== lastTick) { soundUrgent(); }
else if(t > 5) { soundTick(); }
lastTick = t - 1;
return t - 1;
});
}, 1000);
return () => clearInterval(timerRef.current);
}
}, [current, phase]);

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

tudomany:   [0, 15],
matek:      [15, 23],

tech:       [37, 43],
};

const range = CAT_RANGES[catMode];

if(qs.length === 0) { setError("Nincs elég kérdés ebben a kategóriában!"); setPhase("menu"); return; }
setQuestions(qs); setCurrent(0); setScore(0); setAnswers([]); setSelected(null);
setPhase("playing");
}

function handleAnswer(ans) {
clearInterval(timerRef.current);
const q = questions[current];
const correct = ans === q.a;
setSelected(ans);
setAnswers(prev => [...prev, { q: q.q, correct, chosen: ans, right: q.a }]);
if(correct) { setScore(s => s + 1); soundCorrect(); }
else if(ans !== null) { soundWrong(); }
setTimeout(() => {
if(current + 1 >= questions.length) {
soundFanfare();
setPhase("result");
} else { setCurrent(c => c + 1); setSelected(null); }
}, 1200);
}

function AmobaGame({ user, profiles, onBack }) {
const [phase, setPhase]       = useState("menu"); 
const [size, setSize]         = useState(null);
const [mode, setMode]         = useState(null);   
const [board, setBoard]       = useState([]);
const [current, setCurrent]   = useState("X");
const [winner, setWinner]     = useState(null);
const [winLine, setWinLine]   = useState([]);
const [scores, setScores]     = useState({X:0, O:0});


const [onlinePlayers, setOnlinePlayers] = useState([]);
const [mySymbol, setMySymbol]   = useState(null);   
const [opponentId, setOpponentId] = useState(null);
const [opponentName, setOpponentName] = useState("");
const [gameId, setGameId]       = useState(null);
const [invite, setInvite]       = useState(null);   
const channelRef               = useRef(null);
const presenceRef              = useRef(null);
const myId = user?.id ? String(user.id) : ("guest_" + Math.random().toString(36).slice(2,8));

const WIN = (s) => s === 3 ? 3 : 5;
const initBoard = (s) => Array(s).fill(null).map(()=>Array(s).fill(null));


useEffect(() => {
if(mode !== "online") return;
const ch = _supabase.channel("amoba_presence", { config:{ presence:{ key: myId }}});
presenceRef.current = ch;
ch.on("presence", { event:"sync" }, () => {
const state = ch.presenceState();
const players = Object.values(state).flat().map(p => p).filter(p => p.userId !== myId);
setOnlinePlayers(players);
});
ch.on("broadcast", { event:"invite" }, ({ payload }) => {
if(payload.toId === myId && !invite) {
setInvite(payload);
}
});
ch.on("broadcast", { event:"invite_accept" }, ({ payload }) => {
if(payload.toId === myId) {

const gid = payload.gameId;
setGameId(gid);
setOpponentId(payload.fromId);
setOpponentName(payload.fromName);
setMySymbol("X");
setSize(payload.size);
setBoard(initBoard(payload.size));
setCurrent("X"); setWinner(null); setWinLine([]);
setPhase("online-playing");
subscribeGame(gid);
}
});
ch.on("broadcast", { event:"invite_decline" }, ({ payload }) => {
if(payload.toId === myId) {
if(phase === "online-waiting") {
setPhase("online-lobby");
}
}
});
ch.subscribe(async (status) => {
if(status === "SUBSCRIBED") {
await ch.track({ userId: myId, name: user?.name || "Vendég", avatar: user?.avatar || "👤" });
}
});
return () => { ch.unsubscribe(); presenceRef.current = null; };
}, [mode]);


const subscribeGame = (gid) => {
const ch = _supabase.channel("amoba_game_" + gid);
channelRef.current = ch;
ch.on("broadcast", { event:"move" }, ({ payload }) => {
if(payload.playerId === myId) return; 
setBoard(prev => {
const nb = prev.map(row=>[...row]);
nb[payload.r][payload.c] = payload.sym;
const result = checkWinnerStatic(nb, payload.size, payload.winCount);
if(result) {
setWinner(result.winner);
setWinLine(result.line.map(([rr,cc])=>rr*payload.size+cc));
if(result.winner !== "draw") setScores(prev2=>({...prev2,[result.winner]:prev2[result.winner]+1}));
} else {
setCurrent(payload.sym === "X" ? "O" : "X");
}
return nb;
});
});
ch.on("broadcast", { event:"rematch" }, ({ payload }) => {
if(payload.playerId !== myId) {
setBoard(initBoard(payload.size));
setCurrent("X"); setWinner(null); setWinLine([]);
}
});
ch.on("broadcast", { event:"leave" }, () => {
setWinner("leave");
});
ch.subscribe();
};

const checkWinnerStatic = (b, s, W) => {
const lines = [];
for(let r=0;r<s;r++) for(let c=0;c<=s-W;c++) { const l=[]; for(let k=0;k<W;k++) l.push([r,c+k]); lines.push(l); }
for(let c=0;c<s;c++) for(let r=0;r<=s-W;r++) { const l=[]; for(let k=0;k<W;k++) l.push([r+k,c]); lines.push(l); }
for(let r=0;r<=s-W;r++) for(let c=0;c<=s-W;c++) { const l=[]; for(let k=0;k<W;k++) l.push([r+k,c+k]); lines.push(l); }
for(let r=0;r<=s-W;r++) for(let c=W-1;c<s;c++) { const l=[]; for(let k=0;k<W;k++) l.push([r+k,c-k]); lines.push(l); }
for(const line of lines) { const vals=line.map(([r,c])=>b[r][c]); if(vals[0]&&vals.every(v=>v===vals[0])) return {winner:vals[0],line}; }
if(b.every(row=>row.every(c=>c!==null))) return {winner:"draw",line:[]};
return null;
};

const checkWinner = (b, s) => checkWinnerStatic(b, s, WIN(s));


const aiMove = (b, s) => {
const W = WIN(s);
const empty = [];
for(let r=0;r<s;r++) for(let c=0;c<s;c++) if(!b[r][c]) empty.push([r,c]);
const score = (sym) => {
let best = -1, bestCell = null;
for(const [r,c] of empty) {
const nb = b.map(row=>[...row]);
nb[r][c] = sym;
let cnt = 0;
const dirs = [[0,1],[1,0],[1,1],[1,-1]];
for(const [dr,dc] of dirs) {
let n=1;
for(let k=1;k<W;k++) { const nr=r+dr*k,nc=c+dc*k; if(nr>=0&&nr<s&&nc>=0&&nc<s&&nb[nr][nc]===sym) n++; else break; }
for(let k=1;k<W;k++) { const nr=r-dr*k,nc=c-dc*k; if(nr>=0&&nr<s&&nc>=0&&nc<s&&nb[nr][nc]===sym) n++; else break; }
if(n>cnt) cnt=n;
}
if(cnt>best) { best=cnt; bestCell=[r,c]; }
}
return { best, bestCell };
};
const win = score("O");
if(win.best>=W-1) return win.bestCell;
const blk = score("X");
if(blk.best>=W-1) return blk.bestCell;
if(win.best>1) return win.bestCell;
const mid = Math.floor(s/2);
const near = empty.filter(([r,c])=>Math.abs(r-mid)<=2&&Math.abs(c-mid)<=2);
const pool = near.length>0 ? near : empty;
return pool[Math.floor(Math.random()*pool.length)];
};

const startGame = (s, m) => {
setSize(s); setMode(m);
if(m === "ai") {
setBoard(initBoard(s));
setCurrent("X"); setWinner(null); setWinLine([]);
setPhase("ai-playing");
} else {
setPhase("online-lobby");
}
};

const handleClick = (r, c) => {
if(winner || board[r][c]) return;
if(mode === "online") {
if(current !== mySymbol) return; 
const nb = board.map(row=>[...row]);
nb[r][c] = mySymbol;
const result = checkWinner(nb, size);
setBoard(nb);
channelRef.current?.send({ type:"broadcast", event:"move",
payload:{ r, c, sym: mySymbol, playerId: myId, size, winCount: WIN(size) }});
if(result) {
setWinner(result.winner);
setWinLine(result.line.map(([rr,cc])=>rr*size+cc));
if(result.winner !== "draw") setScores(prev=>({...prev,[result.winner]:prev[result.winner]+1}));
} else {
setCurrent(mySymbol === "X" ? "O" : "X");
}
return;
}

const nb = board.map(row=>[...row]);
nb[r][c] = current;
const result = checkWinner(nb, size);
setBoard(nb);
if(result) {
setWinner(result.winner);
setWinLine(result.line.map(([rr,cc])=>rr*size+cc));
if(result.winner !== "draw") setScores(prev=>({...prev,[result.winner]:prev[result.winner]+1}));
return;
}
const next = current==="X"?"O":"X";
setCurrent(next);
if(next==="O") {
setTimeout(()=>{
const [ar,ac] = aiMove(nb, size);
const nb2 = nb.map(row=>[...row]);
nb2[ar][ac] = "O";
const res2 = checkWinner(nb2, size);
setBoard(nb2);
if(res2) {
setWinner(res2.winner);
setWinLine(res2.line.map(([rr,cc])=>rr*size+cc));
if(res2.winner!=="draw") setScores(prev=>({...prev,[res2.winner]:prev[res2.winner]+1}));
} else { setCurrent("X"); }
}, 350);
}
};

const reset = () => {
const nb = initBoard(size);
setBoard(nb); setCurrent("X"); setWinner(null); setWinLine([]);
if(mode === "online") {
channelRef.current?.send({ type:"broadcast", event:"rematch", payload:{ playerId: myId, size }});
}
};

const backToMenu = () => {
if(mode === "online") {
channelRef.current?.send({ type:"broadcast", event:"leave", payload:{} });
channelRef.current?.unsubscribe();
channelRef.current = null;
presenceRef.current?.unsubscribe();
presenceRef.current = null;
}
setPhase("menu"); setMode(null); setSize(null);
setWinner(null); setWinLine([]); setScores({X:0,O:0});
setOnlinePlayers([]); setOpponentId(null); setOpponentName(""); setGameId(null); setInvite(null); setMySymbol(null);
};


const sendInvite = (targetPlayer) => {
const gid = myId + "_" + targetPlayer.userId + "_" + Date.now();
setGameId(gid);
setOpponentId(targetPlayer.userId);
setOpponentName(targetPlayer.name);
setPhase("online-waiting");
presenceRef.current?.send({ type:"broadcast", event:"invite",
payload:{ fromId: myId, fromName: user?.name||"Vendég", fromAvatar: user?.avatar||"👤",
toId: targetPlayer.userId, gameId: gid, size: size || 10 }});
};

const acceptInvite = () => {
const gid = invite.gameId;
const sz = invite.size || 10;
setGameId(gid);
setOpponentId(invite.fromId);
setOpponentName(invite.fromName);
setMySymbol("O");
setSize(sz);
setBoard(initBoard(sz));
setCurrent("X"); setWinner(null); setWinLine([]);
presenceRef.current?.send({ type:"broadcast", event:"invite_accept",
payload:{ fromId: myId, fromName: user?.name||"Vendég", toId: invite.fromId, gameId: gid, size: sz }});
setInvite(null);
setPhase("online-playing");
subscribeGame(gid);
};

const declineInvite = () => {
presenceRef.current?.send({ type:"broadcast", event:"invite_decline",
payload:{ fromId: myId, toId: invite.fromId }});
setInvite(null);
};

const CELL = size===3?88:size===5?60:36;
const xName = mode==="online" ? (mySymbol==="X" ? (user?.name||"Te") : opponentName) : (user?.name || "X");
const oName = mode==="online" ? (mySymbol==="O" ? (user?.name||"Te") : opponentName) : mode==="ai" ? "🤖 Gép" : "O játékos";


if(phase === "online-lobby") return (
<div style={{ maxWidth:480, margin:"0 auto", width:"100%", display:"flex", flexDirection:"column", gap:14, padding:"8px 0" }}>
<div style={{ background:"linear-gradient(135deg,#0e4f6e,#0891B2)", borderRadius:16, padding:"16px 20px", display:"flex", alignItems:"center", gap:14 }}>
<div style={{ fontSize:"2rem" }}>🌐</div>
<div>
<div style={{ color:"white", fontWeight:900, fontSize:"1rem" }}>Online Lobby</div>
<div style={{ color:"rgba(255,255,255,.65)", fontSize:"0.7rem" }}>Válassz ellenfélt a listából</div>
</div>
<button onClick={backToMenu} style={{ marginLeft:"auto", background:"rgba(255,255,255,.12)", border:"none", borderRadius:8, padding:"6px 12px", color:"white", fontWeight:900, fontSize:"0.7rem", cursor:"pointer" }}>← Vissza</button>
</div>

<div style={{ background:gc("card"), borderRadius:14, padding:"16px" }}>

  <script type="text/babel" data-presets="react">
function ChatNaplo({ messages, profiles, deleteMessage, clearRoom }) {
const fmt = (ts) => { try { const d=new Date(ts); return d.toLocaleDateString("hu-HU",{month:"short",day:"numeric"})+" "+d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); } catch(e){return "";} };

const allRooms = [...new Set((messages||[]).map(m=>m.room))].filter(Boolean);
const [deleteDialog, setDeleteDialog] = useState(null);

const getRoomMeta = (room) => {
if(room === "group_all") return { label:"👨‍👩‍👧 Közös chat – mindenki", color:"#F59E0B", bg:"#2d1f00", border:"#92400e" };
if(room === "privat")   return { label:"🔒 Privát (régi)", color:"#A78BFA", bg:"#1a1535", border:"#3b1f6e" };
if(room.startsWith("dm_")) {
const ids = room.replace("dm_","").split("_");
const p1 = profiles.find(p=>String(p.id)===ids[0]);
const p2 = profiles.find(p=>String(p.id)===ids[1]);
const name1 = p1 ? `${p1.avatar} ${p1.name}` : "?";
const name2 = p2 ? `${p2.avatar} ${p2.name}` : "?";
const hasAdmin = (p1&&p1.isAdmin)||(p2&&p2.isAdmin);
return {
label: `${name1} ↔ ${name2}`,
color: hasAdmin ? "#34D399" : "#C084FC",
bg:    hasAdmin ? "#0f2d1a" : "#1e1040",
border: hasAdmin ? "#166534" : "#6b21a8"
};
}
return { label: room, color:"#94a3b8", bg:gc("dark"), border:gc("border") };
};

const sortedRooms = [...allRooms].sort((a,b) => {
const order = (r) => r==="group_all"?0:r==="privat"?1:r.startsWith("dm_")?2:3;
return order(a)-order(b);
});

const [openRoom, setOpenRoom] = useState(sortedRooms[0] || null);

const dialog = deleteDialog ? ReactDOM.createPortal(
<div style={{ position:"fixed", inset:0, background:"rgba(0,5,26,.92)", zIndex:99999, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>

{deleteDialog.type === "room"
? "Csak ebből a nézetből törlöd, vagy az egész adatbázisból?"
: "Csak ebből a nézetből törlöd, vagy az egész adatbázisból?"
}
</div>
<div style={{ display:"flex", flexDirection:"column", gap:10 }}>
<button onClick={()=>{
if(deleteDialog.type === "room") clearRoom(deleteDialog.room);
else deleteMessage(deleteDialog.msgId);
setDeleteDialog(null);
}} style={{ background:"#2d1515", color:"#f87171", border:"1.5px solid #7f1d1d", borderRadius:12, padding:"13px", fontWeight:900, fontSize:"0.82rem", cursor:"pointer" }}>
🗑 Csak a naplóból törlöm

if(deleteDialog.type === "room") clearRoom(deleteDialog.room);

setDeleteDialog(null);

⚠️ Mindenhonnan törlöm
</button>
<button onClick={()=>setDeleteDialog(null)}
style={{ background:"rgba(255,255,255,.08)", color:"rgba(255,255,255,.5)", border:"none", borderRadius:12, padding:"11px", fontWeight:900, fontSize:"0.75rem", cursor:"pointer" }}>
Mégse
</button>
</div>
</div>
</div>,
document.body

return (
<div style={{ display:"flex", flexDirection:"column", gap:0, maxWidth:650, margin:"0 auto", width:"100%" }}>
{dialog}
{/* ── FEJLÉC ── */}
<div style={{ background:"rgba(255,255,255,0.08)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", borderRadius:"28px 28px 0 0", padding:"25px", display:"flex", justifyContent:"space-between", alignItems:"center", border:"2px solid rgba(255,255,255,0.25)", borderBottom:"none" }}>

    {sortedRooms.length} szoba

{sortedRooms.length === 0 && (
  <div style={{ padding:"28px 16px", textAlign:"center", color:"#475569", fontSize:"0.82rem" }}>
    Még nincs egyetlen üzenet sem 💭
  </div>

{sortedRooms.map(room => {
const meta = getRoomMeta(room);
const roomMsgs = (messages||[]).filter(m=>m.room===room).sort((a,b)=>a.ts>b.ts?1:-1);
const isOpen = openRoom === room;
const grouped = {};
roomMsgs.forEach(m=>{ const day=m.ts?m.ts.slice(0,10):"?"; if(!grouped[day]) grouped[day]=[]; grouped[day].push(m); });

return (
<div key={room} style={{ margin:"15px 15px 0", background:"rgba(255,255,255,0.03)", borderRadius:18, border:`1px solid ${meta.border}`, boxShadow:`0 0 15px ${meta.border}26`, transition:"all 0.3s ease", overflow:"hidden" }}>
  {/* ── SZOBA FEJ ── */}

      {Object.entries(grouped).sort().map(([day, msgs]) => (
        <div key={day}>
          <div style={{ textAlign:"center", color:"#475569", fontSize:11, marginBottom:15, fontWeight:700 }}>{day}</div>

function CardMenuLogin({ cards, onSelect, greeting, subtitle }) {
const storageKey = "card_order_" + greeting.slice(0,10).replace(/\s/g,"_");
const [orderedCards, setOrderedCards] = useState(() => {
try {
const saved = localStorage.getItem(storageKey);
if(saved) {
const order = JSON.parse(saved);
const sorted = [...cards].sort((a,b) => {
const ai = order.indexOf(a.id);
const bi = order.indexOf(b.id);
if(ai === -1 && bi === -1) return 0;
if(ai === -1) return 1;
if(bi === -1) return -1;
return ai - bi;
});
return sorted;
}
} catch(e) {}
return cards;
});
const [editMode, setEditMode] = useState(false);
const [dragIdx, setDragIdx] = useState(null);
const [dragOverIdx, setDragOverIdx] = useState(null);

useEffect(() => {
const newOrder = [...cards].sort((a,b) => {
const order = orderedCards.map(c=>c.id);
const ai = order.indexOf(a.id);
const bi = order.indexOf(b.id);
if(ai === -1 && bi === -1) return 0;
if(ai === -1) return 1;
if(bi === -1) return -1;
return ai - bi;
});
const newCards = newOrder.map(c => cards.find(x=>x.id===c.id)||c);
setOrderedCards(newCards);
}, [cards.map(c=>c.badge).join(",")]);

const saveOrder = (newCards) => {
try { localStorage.setItem(storageKey, JSON.stringify(newCards.map(c=>c.id))); } catch(e) {}
};

const handleDragStart = (e, idx) => { setDragIdx(idx); e.dataTransfer.effectAllowed = "move"; };
const handleDragOver = (e, idx) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOverIdx(idx); };
const handleDrop = (e, idx) => {
e.preventDefault();
if(dragIdx === null || dragIdx === idx) { setDragIdx(null); setDragOverIdx(null); return; }
const newCards = [...orderedCards];
const [moved] = newCards.splice(dragIdx, 1);
newCards.splice(idx, 0, moved);
setOrderedCards(newCards); saveOrder(newCards);
setDragIdx(null); setDragOverIdx(null);
};
const handleDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };

// 4-4-3 layout
const n = orderedCards.length;
const rows = [];
let i = 0;
while(i < n) {
const remaining = n - i;
let rowSize;
if(remaining <= 3) rowSize = remaining;
else if(remaining === 5) rowSize = 3;
else rowSize = 4;
rows.push(orderedCards.slice(i, i + rowSize));
i += rowSize;
}

return (

  </button>
  <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:window.innerWidth < 400 ? 6 : 10 }}>
  {rows.map((row, rowIdx) => (
    <div key={rowIdx} style={{ display:"flex", gap:window.innerWidth < 400 ? 6 : 10, justifyContent:"center" }}>
    {row.map((card, colIdx) => {
      const globalIdx = rows.slice(0,rowIdx).reduce((s,r)=>s+r.length,0) + colIdx;
      const isDragging = dragIdx === globalIdx;
      const isDragOver = dragOverIdx === globalIdx;
      const iconSrc = CARD_ICONS[card.id];
      const hasBadge = card.badge !== "" && card.badge !== undefined;
      // Kártya szélessége: 4 oszlop, de mobilon a teljes szélességből számítva
      const vw = window.innerWidth;
      const containerW = Math.min(vw - 16, 560);
      const cols = 4;
      const gapTotal = (cols - 1) * (vw < 400 ? 6 : 10);
      const cardW = Math.floor((containerW - gapTotal) / cols);
      return (
      <div key={card.id}
        draggable={editMode}
        onDragStart={editMode ? (e)=>handleDragStart(e,globalIdx) : undefined}
        onDragOver={editMode ? (e)=>handleDragOver(e,globalIdx) : undefined}
        onDrop={editMode ? (e)=>handleDrop(e,globalIdx) : undefined}
        onDragEnd={editMode ? handleDragEnd : undefined}
        onClick={() => { if(!editMode) onSelect(card.id); }}
        style={{
          flex: `0 0 ${cardW}px`,

          minWidth: 0,

          background: isDragOver ? "rgba(124,58,237,0.25)" : "rgba(255,255,255,0.08)",
          backdropFilter: "blur(16px)",
          WebkitBackdropFilter: "blur(16px)",

          boxShadow: isDragOver ? "0 0 18px rgba(124,58,237,.5)" : "inset 0 1px 8px rgba(255,255,255,0.1), 0 4px 18px rgba(0,0,0,0.3)",

          userSelect: "none",

        }}
        onMouseEnter={e=>{ if(!editMode){ e.currentTarget.style.transform="scale(1.04)"; e.currentTarget.style.background="rgba(255,255,255,0.14)"; }}}
        onMouseLeave={e=>{ if(!editMode){ e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.background="rgba(255,255,255,0.08)"; }}}
      >

          <div style={{ position:"absolute", top:7, right:9, background:"#EF4444", color:"white", borderRadius:10, padding:"2px 7px", fontSize:"0.58rem", fontWeight:900, zIndex:2, lineHeight:1.4, minWidth:18, textAlign:"center", boxShadow:"0 2px 6px rgba(0,0,0,.4)" }}>
            {card.badge}

        {editMode && (

            {card.badgeLabel}

        )}

      );
    })}
    </div>
  ))}
  </div>
  {editMode && <div style={{ color:"rgba(124,58,237,.7)", fontSize:"0.62rem", marginTop:14, fontWeight:700 }}>Húzd a kártyákat a kívánt sorrendbe →</div>}
</div>
);
}



function CardMenuWheel({ cards, onSelect, greeting, subtitle, initialIdx = 0, onIdxChange }) {
const screenH = window.innerHeight;
const VISIBLE = screenH < 750 ? 3 : 5;
const half = Math.floor(VISIBLE / 2);
const CARD_H = screenH < 700 ? 100 : screenH < 800 ? 115 : 140;
const GAP = screenH < 750 ? 10 : 12;
const STEP = CARD_H + GAP;
const CONTAINER_H = VISIBLE * STEP;
const N = cards.length;


const scrollPos = useRef(initialIdx * STEP);
const velocity  = useRef(0);
const rafId     = useRef(null);
const activeIdx = useRef(initialIdx);
const [tick, setTick] = useState(0);

const containerRef = useRef(null);
const dragY      = useRef(null);
const dragScroll = useRef(0);
const lastY      = useRef(0);
const lastT      = useRef(0);
const dragging   = useRef(false);
const cardsRef   = useRef(cards);
useEffect(() => { cardsRef.current = cards; }, [cards]);

const stopRaf = () => { if(rafId.current) { cancelAnimationFrame(rafId.current); rafId.current = null; } };

const wrapPos = (p) => {
const total = N * STEP;
return ((p % total) + total) % total;
};

const runInertia = () => {
stopRaf();
const loop = () => {
velocity.current *= 0.93; 
scrollPos.current += velocity.current;
scrollPos.current = wrapPos(scrollPos.current);

const nearest = Math.round(scrollPos.current / STEP) % N;
const clamped = (nearest + N) % N;
if(activeIdx.current !== clamped) {
activeIdx.current = clamped;
if(navigator.vibrate) navigator.vibrate(6);
if(onIdxChange) onIdxChange(clamped);
}
setTick(t => t + 1);

if(Math.abs(velocity.current) > 0.8) {
rafId.current = requestAnimationFrame(loop);
} else {

const target = clamped * STEP;

let diff = target - scrollPos.current;
const total = N * STEP;
if(diff >  total / 2) diff -= total;
if(diff < -total / 2) diff += total;
const snapLoop = () => {
const d = target - scrollPos.current;
let dd = d;
if(dd >  total/2) dd -= total;
if(dd < -total/2) dd += total;
if(Math.abs(dd) < 0.4) {
scrollPos.current = target;
setTick(t => t + 1);
return;
}
scrollPos.current = wrapPos(scrollPos.current + dd * 0.25);
setTick(t => t + 1);
rafId.current = requestAnimationFrame(snapLoop);
};
snapLoop();
}
};
rafId.current = requestAnimationFrame(loop);
};

const onDown = (e) => {
stopRaf();
const y = e.touches ? e.touches[0].clientY : e.clientY;
dragY.current = y; lastY.current = y; lastT.current = performance.now();
dragScroll.current = scrollPos.current;
velocity.current = 0;
dragging.current = true;
};
const onMove = (e) => {
if(!dragging.current) return;
const y = e.touches ? e.touches[0].clientY : e.clientY;
const now = performance.now();
const dt = Math.max(now - lastT.current, 1);
velocity.current = -(y - lastY.current) / dt * 16;
lastY.current = y; lastT.current = now;
scrollPos.current = wrapPos(dragScroll.current - (y - dragY.current));
setTick(t => t + 1);
};
const onUp = () => {
if(!dragging.current) return;
dragging.current = false;
runInertia();
};

useEffect(() => {
const el = containerRef.current;
if(!el) return;
const prevent = (e) => { if(dragging.current) e.preventDefault(); };
el.addEventListener("touchmove", prevent, { passive: false });
return () => el.removeEventListener("touchmove", prevent);
}, []);

useEffect(() => {
const el = containerRef.current;
if(!el) return;
const onWheel = (e) => {
e.preventDefault();
velocity.current += e.deltaY * 0.8;
runInertia();
};
el.addEventListener("wheel", onWheel, { passive: false });
return () => el.removeEventListener("wheel", onWheel);
}, [N]);

useEffect(() => {
const onKey = (e) => {
if(e.key === "ArrowUp")   { e.preventDefault(); velocity.current = -12; runInertia(); }
if(e.key === "ArrowDown") { e.preventDefault(); velocity.current =  12; runInertia(); }
if(e.key === "Enter")     { e.preventDefault(); onSelect(cardsRef.current[activeIdx.current].id); }
};
window.addEventListener("keydown", onKey);
return () => window.removeEventListener("keydown", onKey);
}, []);

useEffect(() => () => stopRaf(), []);

const sp = scrollPos.current;
const total = N * STEP;
const centerPx = half * STEP;

return (
<div style={{ display:"flex", flexDirection:"column", alignItems:"center", userSelect:"none", WebkitUserSelect:"none" }}>
<div style={{ textAlign:"center", marginBottom: screenH < 750 ? 10 : 16, marginTop: screenH < 750 ? 4 : 8 }}>
<div style={{ color:"rgba(255,255,255,.9)", fontWeight:900, fontSize:"1rem" }}>{greeting}</div>
{subtitle && <div style={{ color:"rgba(255,255,255,.45)", fontSize:"0.7rem", fontWeight:700, marginTop:2 }}>{subtitle}</div>}
</div>

<div
ref={containerRef}
style={{ position:"relative", width:"100%", maxWidth:340, height:CONTAINER_H, overflow:"hidden",
cursor: dragging.current ? "grabbing" : "grab", touchAction:"none" }}
onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
>
<div style={{ position:"absolute", left:0, right:0, top:centerPx, height:CARD_H,
background:"rgba(255,255,255,.06)", borderRadius:18,
border:"1.5px solid rgba(255,255,255,.15)", zIndex:0, pointerEvents:"none" }} />

{cards.map((card, idx) => {

let diff = (idx * STEP) - sp;

if(diff >  total / 2) diff -= total;
if(diff < -total / 2) diff += total;

const absOff = Math.abs(diff / STEP);
if(absOff > half + 0.6) return null;

const isActive = activeIdx.current === idx;
const scale   = 1 - Math.min(absOff, half) * 0.08;
const opacity = 1 - Math.min(absOff, half) * 0.4;

return (
<div
key={card.id}
onClick={() => {
if(!dragging.current) {
if(isActive) onSelect(card.id);
else { velocity.current = diff > 0 ? 6 : -6; runInertia(); }
}
}}
style={{
position:"absolute", left:0, right:0,
top: centerPx,
height: CARD_H,
transform: `translateY(${diff}px) scale(${scale})`,
opacity: Math.max(0, opacity),
background: isActive ? card.bg : "rgba(255,255,255,.05)",
borderRadius:24,
display:"flex", alignItems:"center", gap:18,
padding:"0 28px",
cursor:"pointer",
boxShadow: isActive ? "0 8px 32px rgba(0,0,0,.45), 0 0 0 1.5px rgba(255,255,255,.12)" : "none",
zIndex: Math.round((half + 1 - absOff) * 10),
overflow:"hidden",
willChange:"transform",
}}
>
{isActive && <>
<div style={{ position:"absolute", top:-20, right:-20, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,.08)", pointerEvents:"none" }}/>
<div style={{ position:"absolute", bottom:-15, left:-15, width:60, height:60, borderRadius:"50%", background:"rgba(255,255,255,.06)", pointerEvents:"none" }}/>
</>}
<div style={{ fontSize:"3rem", lineHeight:1, zIndex:1, flexShrink:0 }}>{card.emoji}</div>
<div style={{ flex:1, minWidth:0, zIndex:1 }}>
<div style={{ color: isActive ? "white" : "rgba(255,255,255,.6)", fontWeight:900, fontSize:"1.15rem", lineHeight:1.2 }}>{card.label}</div>
{card.badge !== "" && isActive && (
<div style={{ marginTop:6, display:"flex", alignItems:"center", gap:4 }}>
<span style={{ background:"rgba(0,0,0,.25)", borderRadius:20, padding:"3px 10px", color:"white", fontWeight:900, fontSize:"0.95rem" }}>{card.badge}</span>
{card.badgeLabel && <span style={{ color:"rgba(255,255,255,.6)", fontSize:"0.72rem", fontWeight:700 }}>{card.badgeLabel}</span>}
</div>
)}
</div>
{isActive && <div style={{ color:"rgba(255,255,255,.7)", fontSize:"1.1rem", flexShrink:0, zIndex:1 }}>›</div>}
</div>
);
})}
</div>
</div>
);
}

function TaskSuggestInput({ borderColor, placeholder, accentColor, onChipsChange }) {
const [chips, setChips] = useState([]);
const [query, setQuery] = useState("");
const [open, setOpen] = useState(false);
const wrapRef = useRef();
const inputRef = useRef();

useEffect(() => {
const handler = (e) => { if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
document.addEventListener("mousedown", handler);
return () => document.removeEventListener("mousedown", handler);
}, []);

const addChip = (val) => {
const trimmed = val.trim();
if(!trimmed || chips.includes(trimmed)) return;
const next = [...chips, trimmed];
setChips(next);
if(onChipsChange) onChipsChange(next);
setQuery(""); setOpen(false);
if(inputRef.current) inputRef.current.value = "";
};

const removeChip = (c) => {
const next = chips.filter(x=>x!==c);
setChips(next);
if(onChipsChange) onChipsChange(next);
};

const clearAll = () => { setChips([]); if(onChipsChange) onChipsChange([]); };

const filtered = query.length > 0
? getTaskSuggestions().flatMap(g => g.items.filter(i => i.toLowerCase().includes(query.toLowerCase())).map(i => ({group: g.group, item: i})))
: [];

const ac = accentColor || "#6366F1";

return (
<div ref={wrapRef} style={{ marginBottom:6, position:"relative" }}>
{chips.length > 0 && (
<div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:5 }}>
{chips.map(c => (
<div key={c} style={{ display:"flex", alignItems:"center", gap:3, background:ac, color:"white", borderRadius:20, padding:"3px 8px 3px 10px", fontSize:"0.7rem", fontWeight:900 }}>
<span>{c}</span>
<button onMouseDown={()=>removeChip(c)} style={{ background:"rgba(255,255,255,0.3)", border:"none", color:"white", borderRadius:"50%", width:14, height:14, fontSize:"0.55rem", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0, lineHeight:1 }}>✕</button>
</div>
))}
<button onMouseDown={clearAll} style={{ background:"none", border:"none", color:"#EF4444", fontSize:"0.62rem", fontWeight:900, cursor:"pointer", padding:"2px 4px" }}>Mind törlése</button>
</div>
)}
<div style={{ display:"flex", gap:4, position:"relative" }}>
<input ref={inputRef} value={query} placeholder={chips.length > 0 ? "＋ Add hozzá..." : placeholder}
onChange={e => { setQuery(e.target.value); setOpen(true); }}
onKeyDown={e => { if(e.key==="Enter" && query.trim()) { addChip(query); } }}
onBlur={e => { if(query.trim()) { addChip(query); } }}
style={{ flex:1, padding:"5px 7px", borderRadius:7, border:"none", fontWeight:700, fontSize:"0.85rem", outline:"none", background:"transparent", color:"white", colorScheme:"dark" }} />
<button type="button" onClick={()=>setOpen(o=>!o)}
style={{ background:"transparent", color:"#ffffff", border:"none", borderRadius:7, padding:"5px 9px", fontWeight:900, fontSize:"0.85rem", cursor:"pointer", flexShrink:0 }}>▾</button>
</div>
{open && (
<div style={{ position:"absolute", zIndex:300, left:0, right:0, background:"rgba(15,25,50,0.80)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", border:"1.5px solid rgba(255,255,255,0.25)", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,.8)", maxHeight:220, overflowY:"auto", marginTop:2 }}>
{query.length > 0 ? (
filtered.length === 0
? <div style={{ padding:"10px", color:"rgba(255,255,255,0.6)", fontSize:"0.7rem", textAlign:"center" }}>Nincs találat – nyomj Entert a hozzáadáshoz!</div>
: filtered.map((f,i) => (
<div key={i} onMouseDown={()=>addChip(f.item)}
style={{ padding:"6px 10px", cursor:"pointer", fontSize:"0.72rem", fontWeight:700, borderBottom:"1px solid rgba(255,255,255,0.08)", display:"flex", justifyContent:"space-between", alignItems:"center", background: chips.includes(f.item) ? "rgba(16,185,129,0.25)" : "rgba(255,255,255,0.03)", color:"#ffffff" }}
onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.15)"}
onMouseLeave={e=>e.currentTarget.style.background=chips.includes(f.item)?"rgba(16,185,129,0.2)":"transparent"}>
<span>{f.item}</span>
<span style={{ color: chips.includes(f.item) ? ac : "#9CA3AF", fontSize:"0.6rem" }}>{chips.includes(f.item) ? "✓" : f.group}</span>
</div>
))
) : (
getTaskSuggestions().map(g => (
<div key={g.group}>
<div style={{ padding:"5px 10px 2px", fontSize:"0.6rem", fontWeight:900, color:"#a5b4fc", textTransform:"uppercase", background:"rgba(0,0,0,0.4)", letterSpacing:"0.05em" }}>{g.group}</div>
{g.items.map(item => (
<div key={item} onMouseDown={()=>addChip(item)}
style={{ padding:"5px 14px", cursor:"pointer", fontSize:"0.72rem", fontWeight:700, borderBottom:"1px solid rgba(255,255,255,0.08)", background: chips.includes(item) ? "rgba(16,185,129,0.25)" : "rgba(255,255,255,0.03)", display:"flex", justifyContent:"space-between", color:"#ffffff" }}
onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.15)"}
onMouseLeave={e=>e.currentTarget.style.background=chips.includes(item)?"rgba(16,185,129,0.2)":"transparent"}>
<span>{item}</span>
{chips.includes(item) && <span style={{ color:ac, fontSize:"0.7rem" }}>✓</span>}
</div>
))}
</div>
))
)}
</div>
)}
</div>
);
}

const initC2 = safeColor(user.cardColor?.c2, "#1e3a8a");

const fixed = { c1: "#0f172a", c2: "#1e3a8a" };

try { localStorage.setItem(`cardColor_${user.id}`, JSON.stringify(fixed)); } catch(e) {}
updateData(profiles.map(p => p.id === user.id ? { ...p, cardColor: fixed } : p));

}
}, []);

updateData(profiles.map(p => p.id === user.id ? { ...p, [type]: colors } : p));
showSaved();
};

setUploadingBg(true);

const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
const fileName = `cardbg_${user.id}_${Date.now()}_${Math.floor(Math.random()*9999)}.${ext}`;
const { error } = await _supabase.storage.from("avatars").upload(fileName, file, { contentType: file.type, upsert: false });
if(error) { console.error("Háttérkép feltöltés hiba:", error); alert("Feltöltés sikertelen: " + error.message); return; }
const { data: urlData } = _supabase.storage.from("avatars").getPublicUrl(fileName);
const url = urlData.publicUrl;
updateData(profiles.map(p => p.id === user.id ? { ...p, cardImage: url } : p));
showSaved();
} catch(e) {
console.error("Háttérkép hiba:", e);
alert("Hiba történt: " + e.message);
} finally {
setUploadingBg(false);
}
};

const oldUrl = user.cardImage;
updateData(profiles.map(p => p.id === user.id ? { ...p, cardImage: null } : p));
showSaved();
if(oldUrl && typeof oldUrl === "string" && oldUrl.includes("/avatars/")) {
try {
const parts = oldUrl.split("/avatars/");
if(parts.length >= 2) {
const fileName = parts[1].split("?")[0];
if(fileName.startsWith("cardbg_")) {
await _supabase.storage.from("avatars").remove([fileName]);
}
}
} catch(e) { console.warn("Háttérkép törlési hiba:", e); }
}
};

showSaved();
};

function PickerPane({ slotIdx, profiles, usedIds, onSelect, events, pinFlow, setPinFlow, pinInput, setPinInput, setSlots }) {
const available = profiles.filter(p => !usedIds.includes(p.id));
const [loginName, setLoginName] = useState("");
const [loginPin, setLoginPin] = useState("");
const [loginError, setLoginError] = useState("");

// PIN megjegyzése névhez
const getSavedPin = (name) => {
  try {
    const found = available.find(p => p.name.toLowerCase() === name.toLowerCase());
    if(!found) return "";
    const rememberKey = "pin_remember_" + found.id;
    if(localStorage.getItem(rememberKey) === "false") return "";
    return localStorage.getItem("saved_pin_" + name.toLowerCase()) || "";
  } catch(e) { return ""; }
};
const savePin = (name, pin) => {
  try {
    const found = available.find(p => p.name.toLowerCase() === name.toLowerCase());
    if(!found) return;
    const rememberKey = "pin_remember_" + found.id;
    if(localStorage.getItem(rememberKey) === "false") return;
    localStorage.setItem("saved_pin_" + name.toLowerCase(), pin);
  } catch(e) {}
};

const handleNameChange = (name) => {
  setLoginName(name);
  setLoginError("");
  const saved = getSavedPin(name);
  if(saved) setLoginPin(saved);
  else setLoginPin("");
};

const handleLogin = () => {
  const trimmed = loginName.trim();
  if(!trimmed) { setLoginError("Kérlek válassz profilt vagy írd be a neved!"); return; }
  const found = available.find(p => p.name.toLowerCase() === trimmed.toLowerCase());
  if(!found) { setLoginError("Ismeretlen felhasználónév!"); return; }
  if(found.pin) {
    if(!loginPin) { setLoginError("Kérlek add meg a PIN kódot!"); return; }
    if(loginPin !== found.pin) { setLoginError("Hibás PIN kód!"); return; }
    savePin(found.name, loginPin);
  }
  setLoginError("");
  setSlots(prev=>{ const n=[...prev]; n[slotIdx]=found.id; return n; });
};

const hasPinUser = available.find(p => p.name.toLowerCase() === loginName.trim().toLowerCase() && p.pin);

setEvents(data.events    || []);
if(data.roblox_settings) setRobloxSettings(data.roblox_settings);
if(data.backrooms_settings) setBackroomsSettings(data.backrooms_settings);
if(data.koltseg_data) setKoltsegData(data.koltseg_data);

const initMsgs = data.messages || [];
setMessages(initMsgs);
prevMessageIdsRef.current = new Set(initMsgs.map(m => m.id));

if(data.suggestions && data.suggestions.length > 0) {
const sorted = sortSuggestions(data.suggestions);
setTaskSuggestionsGlobal(sorted);
}
}
} catch(e) {
console.error("DB betöltési hiba:", e);
setDbError("Nem sikerült csatlakozni az adatbázishoz.\n\nHiba: " + (e.message || JSON.stringify(e)) + "\n\nEllenőrizd: 1) Supabase URL és ANON KEY helyes-e, 2) A 'csaladi_app' tábla létezik-e, 3) RLS (Row Level Security) engedélyezi-e az anon hozzáférést.");
} finally {
setDbLoading(false);
}
}
loadFromDB();
}, []);


useEffect(() => {
const poll = async () => {
try {
const { data, error } = await _supabase
.from("csaladi_app")
.select("*")
.eq("id", "main")
.maybeSingle();
if(!error && data) {

const newNotifs = data.notifications || [];
if(newNotifs.length > 0) {
const currentSlots = JSON.parse(localStorage.getItem("csaladi_slots_v1") || "[]");

const loggedInProfiles = (data.profiles || []).filter(p => currentSlots.includes(p.id));
const isAdminDevice = loggedInProfiles.some(p => p.isAdmin === true);
if(isAdminDevice) {
setTaskNotif(newNotifs);
playAlarmSound("pixie", false);
}
}
setProfiles(data.profiles || []);
setRoutines(data.routines || []);
setArchive(data.archive  || []);
setEvents(data.events    || []);
if(data.roblox_settings) setRobloxSettings(data.roblox_settings);
if(data.backrooms_settings) setBackroomsSettings(data.backrooms_settings);
if(data.koltseg_data) setKoltsegData(data.koltseg_data);
setMessages(prev => {
const incoming = data.messages || [];

const savedSlots = JSON.parse(localStorage.getItem("csaladi_slots_v1") || "[]");
const newFromOthers = incoming.filter(m =>
!prevMessageIdsRef.current.has(m.id) &&
!savedSlots.includes(m.senderId)
);
if(newFromOthers.length > 0) {
playMsgSound();
}
prevMessageIdsRef.current = new Set(incoming.map(m => m.id));
return incoming;
});
if(data.suggestions && data.suggestions.length > 0) {
const sorted = sortSuggestions(data.suggestions);
setTaskSuggestionsGlobal(sorted);
}
}
} catch(e) {}
};
const iv = setInterval(poll, 3000);
return () => clearInterval(iv);
}, []);


useEffect(() => {
const check = () => {
const now = new Date();
const nowDate = now.toISOString().slice(0,10);
const nowTime = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
const savedSlots = JSON.parse(localStorage.getItem("csaladi_slots_v1") || "[]");
let changed = false;
const updatedEvents = events.map(ev => {
if(ev.eventDate === nowDate && ev.eventTime === nowTime && !ev.alarmFired) {
playAlarmSound(ev.sound || "csengo", true);
if(savedSlots.some(id => ev.visibleTo === "all" || ev.createdBy === id || savedSlots.includes(id))) {
setGlobalAlert({ type:"event", event: ev });
}
changed = true;
return {...ev, alarmFired: true};
}
return ev;
});
if(changed) updateData(profiles, routines, archive, updatedEvents);
};
if(events.length > 0) {
check();
const iv = setInterval(check, 30000);
return () => clearInterval(iv);
}
}, [events]);


const isSendingRef = useRef(false);
useEffect(() => {
const sendReminders = async () => {
if(events.length === 0) return;
if(isSendingRef.current) return;
isSendingRef.current = true;
const now = new Date();
const nowDate = now.toISOString().slice(0,10);
const nowHour = now.getHours().toString().padStart(2,"0");
const nowMin  = now.getMinutes().toString().padStart(2,"0");
const nowTime = `${nowHour}:${nowMin}`;
let changed = false;
const updatedEvents = await Promise.all(events.map(async ev => {
if(!ev.email || ev.emailSent) return ev;

const shouldSend = ev.notifyDate
? (ev.notifyDate === nowDate && (ev.notifyTime||"09:00") === nowTime)

: (() => {
const evDate = new Date(ev.eventDate);
const diffDays = Math.floor((evDate - now) / (1000*60*60*24));
return diffDays === (ev.notifyDaysBefore||1) || (diffDays === 0 && ev.eventDate === nowDate);
})();
if(!shouldSend) return ev;
try {
const daysUntil = Math.ceil((new Date(ev.eventDate) - now) / (1000*60*60*24));
const emailPayload = {
to_name:     ev.createdByName || "Kedves Felhasználó",
event_title: ev.title,
event_date:  ev.eventDate,
event_time:  ev.eventTime || "",
event_location:    ev.location || "–",
event_description: ev.description || "–",
days_before: daysUntil <= 0 ? "🔴 Ma van!" : daysUntil === 1 ? "🟡 Holnap!" : `🟢 ${daysUntil} nap múlva`,
emoji: ev.emoji || "📅",
};
await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
...emailPayload,
to_email: ev.email,
});
profiles.filter(p=>p.isCoAdmin && p.notifyEmail).forEach(ca => {
emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
...emailPayload,
to_email: ca.notifyEmail,
to_name: ca.name,
}).catch(e=>console.warn("Co-admin reminder hiba:", e));
});
console.log("📧 Email elküldve:", ev.title, "→", ev.email);
changed = true;
return {...ev, emailSent: true};
} catch(e) {
console.warn("Email küldési hiba:", e);
}
return ev;
}));
if(changed) updateData(profiles, routines, archive, updatedEvents);
};

sendReminders();

const iv = setInterval(sendReminders, 60 * 1000);
return () => { clearInterval(iv); isSendingRef.current = false; };
}, [events.length]);


const updateData = async (newP, newR, newA, newE) => {
const _p = newP !== undefined ? newP : profiles;
const _r = newR !== undefined ? newR : routines;
const _a = newA !== undefined ? newA : archive;
const _e = newE !== undefined ? newE : events;
setProfiles(_p); setRoutines(_r); setArchive(_a); setEvents(_e);
setSyncStatus("saving");
try {
const { data: upd, error: updateError } = await _supabase
.from("csaladi_app")
.update({ profiles: _p, routines: _r, archive: _a, events: _e })
.eq("id","main").select();
if(updateError) throw updateError;
if(!upd || upd.length === 0) {
const { error: ie } = await _supabase.from("csaladi_app")
.insert({ id:"main", profiles:_p, routines:_r, archive:_a, events:_e, notifications:[], suggestions:[], messages:[] });
if(ie) throw ie;
}
setSyncStatus("ok");
} catch(e) {
const msg = e?.message || e?.code || JSON.stringify(e);
console.error("Mentési hiba:", msg);
setSyncStatus("error:" + msg);
}
};


const saveRobloxSettings = async (newSettings) => {
const merged = { ...robloxSettings, ...newSettings };
setRobloxSettings(merged);
try {
await _supabase.from("csaladi_app").update({ roblox_settings: merged }).eq("id","main");
} catch(e) { console.error("Roblox mentési hiba:", e); }
};


const saveBackroomsSettings = async (newSettings) => {
const merged = { ...backroomsSettings, ...newSettings };
setBackroomsSettings(merged);
try {
await _supabase.from("csaladi_app").update({ backrooms_settings: merged }).eq("id","main");
} catch(e) { console.error("Backrooms mentési hiba:", e); }
};


const saveKoltsegData = async (newData) => {
const merged = { ...koltsegData, ...newData };
setKoltsegData(merged);
try {
await _supabase.from("csaladi_app").update({ koltseg_data: merged }).eq("id","main");
} catch(e) { console.error("Költség mentési hiba:", e); }
};


const uploadChatImage = async (file) => {
const ext = file.name.split(".").pop() || "jpg";
const fileName = `chat_${Date.now()}_${Math.floor(Math.random()*9999)}.${ext}`;
const { data, error } = await _supabase.storage
.from("chat-images")
.upload(fileName, file, { contentType: file.type, upsert: false });
if(error) throw error;
const { data: urlData } = _supabase.storage.from("chat-images").getPublicUrl(fileName);
return urlData.publicUrl;
};

const uploadAvatarImage = async (file) => {
const ext = file.name.split(".").pop() || "jpg";
const fileName = `avatar_${Date.now()}_${Math.floor(Math.random()*9999)}.${ext}`;
const { error } = await _supabase.storage.from("avatars").upload(fileName, file, { contentType: file.type, upsert: false });
if(error) { console.error("Avatar feltöltés hiba:", error); return null; }
const { data: urlData } = _supabase.storage.from("avatars").getPublicUrl(fileName);
return urlData.publicUrl;
};

const deleteAvatarImage = async (avatarUrl) => {
if(!avatarUrl || !avatarUrl.startsWith("http")) return;
try {
const parts = avatarUrl.split("/avatars/");
if(parts.length < 2) return;
const fileName = parts[1];
await _supabase.storage.from("avatars").remove([fileName]);
} catch(e) { console.error("Avatar törlés hiba:", e); }
};


const sendMessage = async (senderId, room, text, imageUrl) => {
if(!text.trim() && !imageUrl) return;
const sender = profiles.find(p=>p.id===senderId);
if(!sender) return;
const msg = {
id: Date.now()+""+Math.floor(Math.random()*9999),
room, senderId: sender.id, senderName: sender.name, senderAvatar: sender.avatar,
text: text.trim(), imageUrl: imageUrl || null,
ts: new Date().toISOString()
};
const newMsgs = [...messages, msg];
setMessages(newMsgs);
try {
await _supabase.from("csaladi_app").update({ messages: newMsgs }).eq("id","main");
} catch(e) { console.warn("Chat mentési hiba:", e); }
};


const deleteMessage = async (msgId) => {

setMessages(prev => {
const newMsgs = prev.filter(m => String(m.id) !== String(msgId));
_supabase.from("csaladi_app").update({ messages: newMsgs }).eq("id","main")
.then(({error}) => { if(error) console.warn("Chat törlési hiba:", error); });
return newMsgs;
});
};


const clearRoom = async (room) => {
setMessages(prev => {
const newMsgs = prev.filter(m => m.room !== room);
_supabase.from("csaladi_app").update({ messages: newMsgs }).eq("id","main")
.then(({error}) => { if(error) console.warn("Chat törlési hiba:", error); });
return newMsgs;
});
};

const handleSelect = (profile, slot) => {
if((profile.isAdmin && !profile.pinDisabled) || (!profile.isAdmin && profile.pin)){ setPinFlow({slot,profile}); setPinInput(""); }
else { setSlots(prev=>{ const n=[...prev]; n[slot]=profile.id; return n; }); }
};

const handleLogout = (slot) => {
setSlots(prev => { const n=[...prev]; n[slot]=null; localStorage.setItem("csaladi_slots_v1", JSON.stringify(n)); return n; });
};


useEffect(() => {
localStorage.setItem("csaladi_slots_v1", JSON.stringify(slots));
}, [slots]);


useEffect(() => {
if(!dbLoading && profiles.length > 0) {
try {
const saved = localStorage.getItem("csaladi_slots_v1");
if(saved) {
const savedSlots = JSON.parse(saved);
const validSlots = savedSlots.map(id =>
id && profiles.find(p => p.id === id) ? id : null
);
if(validSlots[0] || validSlots[1]) {
setSlots(validSlots);
}
}
} catch(e) {}
}
}, [dbLoading, profiles.length]);

const renderSlot = (slotIdx) => {
const activeId = slots[slotIdx];
const usedIds = slots.filter(Boolean);

if(!activeId) return <PickerPane slotIdx={slotIdx} profiles={profiles} usedIds={usedIds} onSelect={handleSelect} events={events} pinFlow={pinFlow} setPinFlow={setPinFlow} pinInput={pinInput} setPinInput={setPinInput} setSlots={setSlots} />;

const user = profiles.find(p=>p.id===activeId);
if(!user) return null;

if(user.isAdmin || user.isCoAdmin) return (
<AdminPane key={`admin-${activeId}-${slotIdx}`} user={user} routines={routines} profiles={profiles} archive={archive} events={events}
todayNum={todayNum} todayStr={todayStr} updateData={updateData} onLogout={()=>handleLogout(slotIdx)}
messages={messages} sendMessage={sendMessage} deleteMessage={deleteMessage} clearRoom={clearRoom} uploadChatImage={uploadChatImage} slotIdx={slotIdx}
robloxSettings={robloxSettings} saveRobloxSettings={saveRobloxSettings}
backroomsSettings={backroomsSettings} saveBackroomsSettings={saveBackroomsSettings}
koltsegData={koltsegData} saveKoltsegData={saveKoltsegData} uploadAvatarImage={uploadAvatarImage} deleteAvatarImage={deleteAvatarImage} />
);

const colorIdx = profiles.filter(p=>!p.isAdmin).findIndex(p=>p.id===activeId);
return (
<ChildPane user={user} routines={routines} profiles={profiles} archive={archive} events={events}
todayNum={todayNum} todayStr={todayStr} updateData={updateData} onLogout={()=>handleLogout(slotIdx)} colorIdx={colorIdx}
messages={messages} sendMessage={sendMessage} uploadChatImage={uploadChatImage}
robloxSettings={robloxSettings} saveRobloxSettings={saveRobloxSettings}
backroomsSettings={backroomsSettings} saveBackroomsSettings={saveBackroomsSettings} uploadAvatarImage={uploadAvatarImage} deleteAvatarImage={deleteAvatarImage} />
);
};

const activeSlotIdx = slots[0] ? 0 : slots[1] ? 1 : null;


if(dbLoading) return (
<div style={{ position:"fixed", inset:0, background:"#001a33", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
<div style={{ fontSize:"3rem" }}>👨‍👩‍👧‍👦</div>
<div style={{ color:"white", fontWeight:900, fontSize:"1rem", textTransform:"uppercase", letterSpacing:"0.1em" }}>Betöltés...</div>
<div style={{ color:"rgba(255,255,255,.4)", fontSize:"0.7rem" }}>Adatok szinkronizálása...</div>
</div>
);

if(dbError) return (
<div style={{ position:"fixed", inset:0, background:"#001a33", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, padding:24 }}>
<div style={{ fontSize:"3rem" }}>⚠️</div>
<div style={{ color:"#FCA5A5", fontWeight:900, fontSize:"1rem", textAlign:"center" }}>Kapcsolódási hiba</div>
<div style={{ background:"rgba(255,255,255,.08)", borderRadius:12, padding:"12px 16px", maxWidth:400, width:"100%", overflowY:"auto", maxHeight:200 }}>
<div style={{ color:"#FCD34D", fontSize:"0.68rem", fontWeight:900, textTransform:"uppercase", marginBottom:6 }}>Hibaüzenet:</div>
<div style={{ color:"rgba(255,255,255,.7)", fontSize:"0.65rem", lineHeight:1.7, whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{dbError}</div>
</div>
<div style={{ background:"rgba(255,255,255,.08)", borderRadius:12, padding:"12px 16px", maxWidth:400, width:"100%" }}>
<div style={{ color:"rgba(255,255,255,.6)", fontSize:"0.65rem", fontWeight:900, textTransform:"uppercase", marginBottom:6 }}>Lehetséges okok:</div>
<div style={{ color:"rgba(255,255,255,.5)", fontSize:"0.65rem", lineHeight:1.8 }}>
1. A <strong style={{color:"#FCD34D"}}>SUPABASE_URL</strong> vagy <strong style={{color:"#FCD34D"}}>SUPABASE_ANON</strong> hibás<br/>
2. A <strong style={{color:"#FCD34D"}}>csaladi_app</strong> tábla nem létezik a Supabase-ben<br/>
3. <strong style={{color:"#FCD34D"}}>RLS</strong> (Row Level Security) blokkolja az anon hozzáférést<br/>
4. Nincs internetkapcsolat
</div>
</div>
<button onClick={()=>window.location.reload()} style={{ background:"#7C3AED", color:"white", border:"none", borderRadius:10, padding:"10px 24px", fontWeight:900, fontSize:"0.8rem", cursor:"pointer" }}>↺ Újra próbál</button>
</div>
);

return (
<div className="dual-wrap">
{syncStatus === "saving" && (
<div style={{ position:"fixed", bottom:8, left:"50%", transform:"translateX(-50%)", background:"rgba(0,0,0,.7)", color:"white", borderRadius:20, padding:"4px 14px", fontSize:"0.62rem", fontWeight:700, zIndex:99998, pointerEvents:"none" }}>
☁️ Mentés...
</div>
)}
{syncStatus === "error" && (
<div style={{ position:"fixed", bottom:8, left:"50%", transform:"translateX(-50%)", background:"rgba(239,68,68,.9)", color:"white", borderRadius:20, padding:"4px 14px", fontSize:"0.62rem", fontWeight:700, zIndex:99998, cursor:"pointer" }}
onClick={()=>setSyncStatus("ok")}>
⚠️ Mentési hiba – koppints a bezáráshoz
</div>
)}
{taskNotif && taskNotif.length > 0 && (
<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:99999, padding:16 }}
onClick={()=>setTaskNotif(null)}>
<div style={{ background:"white", borderRadius:24, padding:24, maxWidth:360, width:"100%", textAlign:"center", boxShadow:"0 20px 60px rgba(0,0,0,.4)", maxHeight:"80vh", overflowY:"auto" }}
onClick={e=>e.stopPropagation()}>
<div style={{ fontSize:"2rem", marginBottom:4 }}>🎉</div>
<div style={{ fontWeight:900, fontSize:"1.1rem", color:"#1F2937", marginBottom:12 }}>
{taskNotif.length === 1
? `${taskNotif[0].childName} elvégzett egy feladatot!`
: `${taskNotif.length} feladat teljesítve!`}
</div>
{Object.entries(taskNotif.reduce((acc, n) => {
const key = n.childName;
if(!acc[key]) acc[key] = {avatar: n.childAvatar, routines: [], tasks: []};
if(n.type === 'routine') acc[key].routines.push(n);
else acc[key].tasks.push(n);
return acc;
}, {})).map(([name, group]) => (
<div key={name} style={{ marginBottom:12, textAlign:"left" }}>
<div style={{ fontWeight:900, fontSize:"0.85rem", color:"#374151", marginBottom:6 }}>
{group.avatar} {name}
</div>
{group.routines.length > 0 && (
<div style={{ marginBottom:6 }}>
<div style={{ fontSize:"0.68rem", fontWeight:900, color:"#7C3AED", textTransform:"uppercase", marginBottom:3 }}>🔄 Napi rutinok</div>
{group.routines.map((n, i) => (
<div key={i} style={{ background:"#F5F3FF", border:"1.5px solid #C4B5FD", borderRadius:8, padding:"6px 10px", marginBottom:3, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
<span style={{ fontSize:"0.82rem", fontWeight:700, color:"#5B21B6" }}>✅ {n.taskText}</span>

</div>
))}
</div>
)}
{group.tasks.length > 0 && (
<div>
<div style={{ fontSize:"0.68rem", fontWeight:900, color:"#15803D", textTransform:"uppercase", marginBottom:3 }}>📋 Feladatok</div>

<div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
{n.gold > 0 && <div style={{ fontSize:"0.68rem", color:"#D97706", fontWeight:700 }}>🥇 +{n.gold}</div>}
<div style={{ fontSize:"0.62rem", color:"#9CA3AF" }}>🕐 {n.time}</div>
</div>
</div>
))}
</div>
)}
</div>
))}
<button onClick={async ()=>{ setTaskNotif(null); await _supabase.from("csaladi_app").update({notifications:[]}).eq("id","main"); }}
style={{ background:"#22C55E", color:"white", border:"none", borderRadius:12, padding:"10px 28px", fontWeight:900, fontSize:"0.9rem", cursor:"pointer", width:"100%", marginTop:8 }}>

</div>
</div>
)}

<div style={{ fontSize:"3.5rem", marginBottom:8 }}>{ev.emoji || "📅"}</div>
<div style={{ color:"white", fontWeight:900, fontSize:"1.4rem" }}>🔔 Esemény riasztás!</div>

</div>
</div>
<div style={{ padding:"24px 28px 28px" }}>

{ev.description && <div style={{ color:"#6B7280", fontSize:"0.85rem", marginBottom:16, lineHeight:1.6 }}>{ev.description}</div>}
<div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
{ev.location && <span style={{ background:"#EDE9FE", color:"#6D28D9", borderRadius:20, padding:"4px 12px", fontSize:"0.72rem", fontWeight:700 }}>📍 {ev.location}</span>}
<span style={{ background:"#EDE9FE", color:"#6D28D9", borderRadius:20, padding:"4px 12px", fontSize:"0.72rem", fontWeight:700 }}>👤 {ev.createdByName}</span>

<button onClick={()=>{ 
  updateData(profiles, (events||[]).map(e => e.id === ev.id ? {...e, alarmFired: false} : e));
  setGlobalAlert(null); setAlertTextRevealed(false); setAlertEditing(false); 
}}
style={{ background:"linear-gradient(135deg,#7C3AED,#A855F7)", color:"white", border:"none", borderRadius:12, padding:"10px 32px", fontWeight:900, fontSize:"0.95rem", cursor:"pointer" }}>OK</button>
</div>
</div>
</div>
</div>
);
})()}
{activeSlotIdx !== null ? (
<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
{renderSlot(activeSlotIdx)}
</div>
) : (
renderSlot(0)
)}


{/* RÉGI KÜLÖN ABLAKOS PIN-OVERLAY – eltávolítva, most a kártyán belül történik */}
</div>
);
}
