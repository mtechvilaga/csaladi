setEvents(data.events    || []);
if(data.roblox_settings) setRobloxSettings(data.roblox_settings);
if(data.backrooms_settings) setBackroomsSettings(data.backrooms_settings);
if(data.koltseg_data) setKoltsegData(data.koltseg_data);

const initMsgs = data.messages || [];
setMessages(initMsgs);
prevMessageIdsRef.current = new Set(initMsgs.map(m => m.id));

if(data.suggestions && data.suggestions.length > 0) {
const sorted = sortSuggestions(data.suggestions);
setTaskSuggestionsGlobal(sorted);
}
}
} catch(e) {
console.error("DB betöltési hiba:", e);
setDbError("Nem sikerült csatlakozni az adatbázishoz.\n\nHiba: " + (e.message || JSON.stringify(e)) + "\n\nEllenőrizd: 1) Supabase URL és ANON KEY helyes-e, 2) A 'csaladi_app' tábla létezik-e, 3) RLS (Row Level Security) engedélyezi-e az anon hozzáférést.");
} finally {
setDbLoading(false);
}
}
loadFromDB();
}, []);


useEffect(() => {
const poll = async () => {
try {
const { data, error } = await _supabase
.from("csaladi_app")
.select("*")
.eq("id", "main")
.maybeSingle();
if(!error && data) {

const newNotifs = data.notifications || [];
if(newNotifs.length > 0) {
const currentSlots = JSON.parse(localStorage.getItem("csaladi_slots_v1") || "[]");

const loggedInProfiles = (data.profiles || []).filter(p => currentSlots.includes(p.id));
const isAdminDevice = loggedInProfiles.some(p => p.isAdmin === true);
if(isAdminDevice) {
setTaskNotif(newNotifs);
playAlarmSound("pixie", false);
}
}
setProfiles(data.profiles || []);
setRoutines(data.routines || []);
setArchive(data.archive  || []);
setEvents(data.events    || []);
if(data.roblox_settings) setRobloxSettings(data.roblox_settings);
if(data.backrooms_settings) setBackroomsSettings(data.backrooms_settings);
if(data.koltseg_data) setKoltsegData(data.koltseg_data);
setMessages(prev => {
const incoming = data.messages || [];

const savedSlots = JSON.parse(localStorage.getItem("csaladi_slots_v1") || "[]");
const newFromOthers = incoming.filter(m =>
!prevMessageIdsRef.current.has(m.id) &&
!savedSlots.includes(m.senderId)
);
if(newFromOthers.length > 0) {
playMsgSound();
}
prevMessageIdsRef.current = new Set(incoming.map(m => m.id));
return incoming;
});
if(data.suggestions && data.suggestions.length > 0) {
const sorted = sortSuggestions(data.suggestions);
setTaskSuggestionsGlobal(sorted);
}
}
} catch(e) {}
};
const iv = setInterval(poll, 3000);
return () => clearInterval(iv);
}, []);


useEffect(() => {
const check = () => {
const now = new Date();
const nowDate = now.toISOString().slice(0,10);
const nowTime = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
const savedSlots = JSON.parse(localStorage.getItem("csaladi_slots_v1") || "[]");
let changed = false;
const updatedEvents = events.map(ev => {
if(ev.eventDate === nowDate && ev.eventTime === nowTime && !ev.alarmFired) {
playAlarmSound(ev.sound || "csengo", true);
if(savedSlots.some(id => ev.visibleTo === "all" || ev.createdBy === id || savedSlots.includes(id))) {
setGlobalAlert({ type:"event", event: ev });
}
changed = true;
return {...ev, alarmFired: true};
}
return ev;
});
if(changed) updateData(profiles, routines, archive, updatedEvents);
};
if(events.length > 0) {
check();
const iv = setInterval(check, 30000);
return () => clearInterval(iv);
}
}, [events]);


const isSendingRef = useRef(false);
useEffect(() => {
const sendReminders = async () => {
if(events.length === 0) return;
if(isSendingRef.current) return;
isSendingRef.current = true;
const now = new Date();
const nowDate = now.toISOString().slice(0,10);
const nowHour = now.getHours().toString().padStart(2,"0");
const nowMin  = now.getMinutes().toString().padStart(2,"0");
const nowTime = `${nowHour}:${nowMin}`;
let changed = false;
const updatedEvents = await Promise.all(events.map(async ev => {
if(!ev.email || ev.emailSent) return ev;

const shouldSend = ev.notifyDate
? (ev.notifyDate === nowDate && (ev.notifyTime||"09:00") === nowTime)

: (() => {
const evDate = new Date(ev.eventDate);
const diffDays = Math.floor((evDate - now) / (1000*60*60*24));
return diffDays === (ev.notifyDaysBefore||1) || (diffDays === 0 && ev.eventDate === nowDate);
})();
if(!shouldSend) return ev;
try {
const daysUntil = Math.ceil((new Date(ev.eventDate) - now) / (1000*60*60*24));
const emailPayload = {
to_name:     ev.createdByName || "Kedves Felhasználó",
event_title: ev.title,
event_date:  ev.eventDate,
event_time:  ev.eventTime || "",
event_location:    ev.location || "–",
event_description: ev.description || "–",
days_before: daysUntil <= 0 ? "🔴 Ma van!" : daysUntil === 1 ? "🟡 Holnap!" : `🟢 ${daysUntil} nap múlva`,
emoji: ev.emoji || "📅",
};
await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
...emailPayload,
to_email: ev.email,
});
profiles.filter(p=>p.isCoAdmin && p.notifyEmail).forEach(ca => {
emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
...emailPayload,
to_email: ca.notifyEmail,
to_name: ca.name,
}).catch(e=>console.warn("Co-admin reminder hiba:", e));
});
console.log("📧 Email elküldve:", ev.title, "→", ev.email);
changed = true;
return {...ev, emailSent: true};
} catch(e) {
console.warn("Email küldési hiba:", e);
}
return ev;
}));
if(changed) updateData(profiles, routines, archive, updatedEvents);
};

sendReminders();

const iv = setInterval(sendReminders, 60 * 1000);
return () => { clearInterval(iv); isSendingRef.current = false; };
}, [events.length]);


const updateData = async (newP, newR, newA, newE) => {
const _p = newP !== undefined ? newP : profiles;
const _r = newR !== undefined ? newR : routines;
const _a = newA !== undefined ? newA : archive;
const _e = newE !== undefined ? newE : events;
setProfiles(_p); setRoutines(_r); setArchive(_a); setEvents(_e);
setSyncStatus("saving");
try {
const { data: upd, error: updateError } = await _supabase
.from("csaladi_app")
.update({ profiles: _p, routines: _r, archive: _a, events: _e })
.eq("id","main").select();
if(updateError) throw updateError;
if(!upd || upd.length === 0) {
const { error: ie } = await _supabase.from("csaladi_app")
.insert({ id:"main", profiles:_p, routines:_r, archive:_a, events:_e, notifications:[], suggestions:[], messages:[] });
if(ie) throw ie;
}
setSyncStatus("ok");
} catch(e) {
const msg = e?.message || e?.code || JSON.stringify(e);
console.error("Mentési hiba:", msg);
setSyncStatus("error:" + msg);
}
};


const saveRobloxSettings = async (newSettings) => {
const merged = { ...robloxSettings, ...newSettings };
setRobloxSettings(merged);
try {
await _supabase.from("csaladi_app").update({ roblox_settings: merged }).eq("id","main");
} catch(e) { console.error("Roblox mentési hiba:", e); }
};


const saveBackroomsSettings = async (newSettings) => {
const merged = { ...backroomsSettings, ...newSettings };
setBackroomsSettings(merged);
try {
await _supabase.from("csaladi_app").update({ backrooms_settings: merged }).eq("id","main");
} catch(e) { console.error("Backrooms mentési hiba:", e); }
};


const saveKoltsegData = async (newData) => {
const merged = { ...koltsegData, ...newData };
setKoltsegData(merged);
try {
await _supabase.from("csaladi_app").update({ koltseg_data: merged }).eq("id","main");
} catch(e) { console.error("Költség mentési hiba:", e); }
};


const uploadChatImage = async (file) => {
const ext = file.name.split(".").pop() || "jpg";
const fileName = `chat_${Date.now()}_${Math.floor(Math.random()*9999)}.${ext}`;
const { data, error } = await _supabase.storage
.from("chat-images")
.upload(fileName, file, { contentType: file.type, upsert: false });
if(error) throw error;
const { data: urlData } = _supabase.storage.from("chat-images").getPublicUrl(fileName);
return urlData.publicUrl;
};

const uploadAvatarImage = async (file) => {
const ext = file.name.split(".").pop() || "jpg";
const fileName = `avatar_${Date.now()}_${Math.floor(Math.random()*9999)}.${ext}`;
const { error } = await _supabase.storage.from("avatars").upload(fileName, file, { contentType: file.type, upsert: false });
if(error) { console.error("Avatar feltöltés hiba:", error); return null; }
const { data: urlData } = _supabase.storage.from("avatars").getPublicUrl(fileName);
return urlData.publicUrl;
};

const deleteAvatarImage = async (avatarUrl) => {
if(!avatarUrl || !avatarUrl.startsWith("http")) return;
try {
const parts = avatarUrl.split("/avatars/");
if(parts.length < 2) return;
const fileName = parts[1];
await _supabase.storage.from("avatars").remove([fileName]);
} catch(e) { console.error("Avatar törlés hiba:", e); }
};


const sendMessage = async (senderId, room, text, imageUrl) => {
if(!text.trim() && !imageUrl) return;
const sender = profiles.find(p=>p.id===senderId);
if(!sender) return;
const msg = {
id: Date.now()+""+Math.floor(Math.random()*9999),
room, senderId: sender.id, senderName: sender.name, senderAvatar: sender.avatar,
text: text.trim(), imageUrl: imageUrl || null,
ts: new Date().toISOString()
};
const newMsgs = [...messages, msg];
setMessages(newMsgs);
try {
await _supabase.from("csaladi_app").update({ messages: newMsgs }).eq("id","main");
} catch(e) { console.warn("Chat mentési hiba:", e); }
};


const deleteMessage = async (msgId) => {

setMessages(prev => {
const newMsgs = prev.filter(m => String(m.id) !== String(msgId));
_supabase.from("csaladi_app").update({ messages: newMsgs }).eq("id","main")
.then(({error}) => { if(error) console.warn("Chat törlési hiba:", error); });
return newMsgs;
});
};


const clearRoom = async (room) => {
setMessages(prev => {
const newMsgs = prev.filter(m => m.room !== room);
_supabase.from("csaladi_app").update({ messages: newMsgs }).eq("id","main")
.then(({error}) => { if(error) console.warn("Chat törlési hiba:", error); });
return newMsgs;
});
};

const handleSelect = (profile, slot) => {
if((profile.isAdmin && !profile.pinDisabled) || (!profile.isAdmin && profile.pin)){ setPinFlow({slot,profile}); setPinInput(""); }
else { setSlots(prev=>{ const n=[...prev]; n[slot]=profile.id; return n; }); }
};

const handleLogout = (slot) => {
setSlots(prev => { const n=[...prev]; n[slot]=null; localStorage.setItem("csaladi_slots_v1", JSON.stringify(n)); return n; });
};


useEffect(() => {
localStorage.setItem("csaladi_slots_v1", JSON.stringify(slots));
}, [slots]);


useEffect(() => {
if(!dbLoading && profiles.length > 0) {
try {
const saved = localStorage.getItem("csaladi_slots_v1");
if(saved) {
const savedSlots = JSON.parse(saved);
const validSlots = savedSlots.map(id =>
id && profiles.find(p => p.id === id) ? id : null
);
if(validSlots[0] || validSlots[1]) {
setSlots(validSlots);
}
}
} catch(e) {}
}
}, [dbLoading, profiles.length]);

const renderSlot = (slotIdx) => {
const activeId = slots[slotIdx];
const usedIds = slots.filter(Boolean);

if(!activeId) return <PickerPane slotIdx={slotIdx} profiles={profiles} usedIds={usedIds} onSelect={handleSelect} events={events} pinFlow={pinFlow} setPinFlow={setPinFlow} pinInput={pinInput} setPinInput={setPinInput} setSlots={setSlots} />;

const user = profiles.find(p=>p.id===activeId);
if(!user) return null;

if(user.isAdmin || user.isCoAdmin) return (
<AdminPane key={`admin-${activeId}-${slotIdx}`} user={user} routines={routines} profiles={profiles} archive={archive} events={events}
todayNum={todayNum} todayStr={todayStr} updateData={updateData} onLogout={()=>handleLogout(slotIdx)}
messages={messages} sendMessage={sendMessage} deleteMessage={deleteMessage} clearRoom={clearRoom} uploadChatImage={uploadChatImage} slotIdx={slotIdx}
robloxSettings={robloxSettings} saveRobloxSettings={saveRobloxSettings}
backroomsSettings={backroomsSettings} saveBackroomsSettings={saveBackroomsSettings}
koltsegData={koltsegData} saveKoltsegData={saveKoltsegData} uploadAvatarImage={uploadAvatarImage} deleteAvatarImage={deleteAvatarImage} />
);

const colorIdx = profiles.filter(p=>!p.isAdmin).findIndex(p=>p.id===activeId);
return (
<ChildPane user={user} routines={routines} profiles={profiles} archive={archive} events={events}
todayNum={todayNum} todayStr={todayStr} updateData={updateData} onLogout={()=>handleLogout(slotIdx)} colorIdx={colorIdx}
messages={messages} sendMessage={sendMessage} uploadChatImage={uploadChatImage}
robloxSettings={robloxSettings} saveRobloxSettings={saveRobloxSettings}
backroomsSettings={backroomsSettings} saveBackroomsSettings={saveBackroomsSettings} uploadAvatarImage={uploadAvatarImage} deleteAvatarImage={deleteAvatarImage} />
);
};

const activeSlotIdx = slots[0] ? 0 : slots[1] ? 1 : null;


if(dbLoading) return (
<div style={{ position:"fixed", inset:0, background:"#001a33", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
<div style={{ fontSize:"3rem" }}>👨‍👩‍👧‍👦</div>
<div style={{ color:"white", fontWeight:900, fontSize:"1rem", textTransform:"uppercase", letterSpacing:"0.1em" }}>Betöltés...</div>
<div style={{ color:"rgba(255,255,255,.4)", fontSize:"0.7rem" }}>Adatok szinkronizálása...</div>
</div>
);

if(dbError) return (
<div style={{ position:"fixed", inset:0, background:"#001a33", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, padding:24 }}>
<div style={{ fontSize:"3rem" }}>⚠️</div>
<div style={{ color:"#FCA5A5", fontWeight:900, fontSize:"1rem", textAlign:"center" }}>Kapcsolódási hiba</div>
<div style={{ background:"rgba(255,255,255,.08)", borderRadius:12, padding:"12px 16px", maxWidth:400, width:"100%", overflowY:"auto", maxHeight:200 }}>
<div style={{ color:"#FCD34D", fontSize:"0.68rem", fontWeight:900, textTransform:"uppercase", marginBottom:6 }}>Hibaüzenet:</div>
<div style={{ color:"rgba(255,255,255,.7)", fontSize:"0.65rem", lineHeight:1.7, whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{dbError}</div>
</div>
<div style={{ background:"rgba(255,255,255,.08)", borderRadius:12, padding:"12px 16px", maxWidth:400, width:"100%" }}>
<div style={{ color:"rgba(255,255,255,.6)", fontSize:"0.65rem", fontWeight:900, textTransform:"uppercase", marginBottom:6 }}>Lehetséges okok:</div>
<div style={{ color:"rgba(255,255,255,.5)", fontSize:"0.65rem", lineHeight:1.8 }}>
1. A <strong style={{color:"#FCD34D"}}>SUPABASE_URL</strong> vagy <strong style={{color:"#FCD34D"}}>SUPABASE_ANON</strong> hibás<br/>
2. A <strong style={{color:"#FCD34D"}}>csaladi_app</strong> tábla nem létezik a Supabase-ben<br/>
3. <strong style={{color:"#FCD34D"}}>RLS</strong> (Row Level Security) blokkolja az anon hozzáférést<br/>
4. Nincs internetkapcsolat
</div>
</div>
<button onClick={()=>window.location.reload()} style={{ background:"#7C3AED", color:"white", border:"none", borderRadius:10, padding:"10px 24px", fontWeight:900, fontSize:"0.8rem", cursor:"pointer" }}>↺ Újra próbál</button>
</div>
);

return (
<div className="dual-wrap">
{syncStatus === "saving" && (
<div style={{ position:"fixed", bottom:8, left:"50%", transform:"translateX(-50%)", background:"rgba(0,0,0,.7)", color:"white", borderRadius:20, padding:"4px 14px", fontSize:"0.62rem", fontWeight:700, zIndex:99998, pointerEvents:"none" }}>
☁️ Mentés...
</div>
)}
{syncStatus === "error" && (
<div style={{ position:"fixed", bottom:8, left:"50%", transform:"translateX(-50%)", background:"rgba(239,68,68,.9)", color:"white", borderRadius:20, padding:"4px 14px", fontSize:"0.62rem", fontWeight:700, zIndex:99998, cursor:"pointer" }}
onClick={()=>setSyncStatus("ok")}>
⚠️ Mentési hiba – koppints a bezáráshoz
</div>
)}
{taskNotif && taskNotif.length > 0 && (
<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:99999, padding:16 }}
onClick={()=>setTaskNotif(null)}>
<div style={{ background:"white", borderRadius:24, padding:24, maxWidth:360, width:"100%", textAlign:"center", boxShadow:"0 20px 60px rgba(0,0,0,.4)", maxHeight:"80vh", overflowY:"auto" }}
onClick={e=>e.stopPropagation()}>
<div style={{ fontSize:"2rem", marginBottom:4 }}>🎉</div>
<div style={{ fontWeight:900, fontSize:"1.1rem", color:"#1F2937", marginBottom:12 }}>
{taskNotif.length === 1
? `${taskNotif[0].childName} elvégzett egy feladatot!`
: `${taskNotif.length} feladat teljesítve!`}
</div>
{Object.entries(taskNotif.reduce((acc, n) => {
const key = n.childName;
if(!acc[key]) acc[key] = {avatar: n.childAvatar, routines: [], tasks: []};
if(n.type === 'routine') acc[key].routines.push(n);
else acc[key].tasks.push(n);
return acc;
}, {})).map(([name, group]) => (
<div key={name} style={{ marginBottom:12, textAlign:"left" }}>
<div style={{ fontWeight:900, fontSize:"0.85rem", color:"#374151", marginBottom:6 }}>
{group.avatar} {name}
</div>
{group.routines.length > 0 && (
<div style={{ marginBottom:6 }}>
<div style={{ fontSize:"0.68rem", fontWeight:900, color:"#7C3AED", textTransform:"uppercase", marginBottom:3 }}>🔄 Napi rutinok</div>
{group.routines.map((n, i) => (
<div key={i} style={{ background:"#F5F3FF", border:"1.5px solid #C4B5FD", borderRadius:8, padding:"6px 10px", marginBottom:3, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
<span style={{ fontSize:"0.82rem", fontWeight:700, color:"#5B21B6" }}>✅ {n.taskText}</span>

</div>
))}
</div>
)}
{group.tasks.length > 0 && (
<div>
<div style={{ fontSize:"0.68rem", fontWeight:900, color:"#15803D", textTransform:"uppercase", marginBottom:3 }}>📋 Feladatok</div>

<div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
{n.gold > 0 && <div style={{ fontSize:"0.68rem", color:"#D97706", fontWeight:700 }}>🥇 +{n.gold}</div>}
<div style={{ fontSize:"0.62rem", color:"#9CA3AF" }}>🕐 {n.time}</div>
</div>
</div>
))}
</div>
)}
</div>
))}
<button onClick={async ()=>{ setTaskNotif(null); await _supabase.from("csaladi_app").update({notifications:[]}).eq("id","main"); }}
style={{ background:"#22C55E", color:"white", border:"none", borderRadius:12, padding:"10px 28px", fontWeight:900, fontSize:"0.9rem", cursor:"pointer", width:"100%", marginTop:8 }}>

</div>
</div>
)}

<div style={{ fontSize:"3.5rem", marginBottom:8 }}>{ev.emoji || "📅"}</div>
<div style={{ color:"white", fontWeight:900, fontSize:"1.4rem" }}>🔔 Esemény riasztás!</div>

</div>
</div>
<div style={{ padding:"24px 28px 28px" }}>

{ev.description && <div style={{ color:"#6B7280", fontSize:"0.85rem", marginBottom:16, lineHeight:1.6 }}>{ev.description}</div>}
<div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
{ev.location && <span style={{ background:"#EDE9FE", color:"#6D28D9", borderRadius:20, padding:"4px 12px", fontSize:"0.72rem", fontWeight:700 }}>📍 {ev.location}</span>}
<span style={{ background:"#EDE9FE", color:"#6D28D9", borderRadius:20, padding:"4px 12px", fontSize:"0.72rem", fontWeight:700 }}>👤 {ev.createdByName}</span>

<button onClick={()=>{ 
  updateData(profiles, (events||[]).map(e => e.id === ev.id ? {...e, alarmFired: false} : e));
  setGlobalAlert(null); setAlertTextRevealed(false); setAlertEditing(false); 
}}
style={{ background:"linear-gradient(135deg,#7C3AED,#A855F7)", color:"white", border:"none", borderRadius:12, padding:"10px 32px", fontWeight:900, fontSize:"0.95rem", cursor:"pointer" }}>OK</button>
</div>
</div>
</div>
</div>
);
})()}
{activeSlotIdx !== null ? (
<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
{renderSlot(activeSlotIdx)}
</div>
) : (
renderSlot(0)
)}


{/* RÉGI KÜLÖN ABLAKOS PIN-OVERLAY – eltávolítva, most a kártyán belül történik */}
</div>
);
}
